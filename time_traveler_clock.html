<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Time Traveler Clock</title>
<style>
  :root {
    --bg1: #7dd3fc;
    --bg2: #c4b5fd;
    --panel: rgba(255,255,255,0.88);
    --text: #1f2937;
    --accent: #f59e0b;
    --accent2: #10b981;
    --danger: #ef4444;
    --shadow: 0 10px 30px rgba(0,0,0,0.18);
    --radius: 22px;
    --clock-size: min(56vh, 72vw);
    --ui-gap: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, var(--bg1), var(--bg2));
    touch-action: manipulation;
  }

  body.theme-home { --bg1: #93c5fd; --bg2: #fef3c7; }
  body.theme-dino { --bg1: #86efac; --bg2: #67e8f9; }
  body.theme-pirate { --bg1: #60a5fa; --bg2: #fde68a; }
  body.theme-space { --bg1: #1e1b4b; --bg2: #312e81; }
  body.theme-castle { --bg1: #c4b5fd; --bg2: #fecdd3; }

  #app {
    width: 100vw;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    padding: max(env(safe-area-inset-top, 8px), 8px) 10px max(env(safe-area-inset-bottom, 8px), 8px);
    gap: var(--ui-gap);
    position: relative;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge, .pill {
    background: rgba(255,255,255,0.85);
    border-radius: 999px;
    padding: 7px 12px;
    box-shadow: var(--shadow);
    font-weight: 700;
    font-size: clamp(13px, 2vw, 18px);
  }

  .screen {
    display: none;
    width: 100%;
    height: 100%;
    min-height: 0;
  }
  .screen.active { display: block; }

  .card {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    height: 100%;
    padding: 16px;
    min-height: 0;
  }

  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .title-screen {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 16px;
    align-items: center;
    justify-items: center;
  }

  h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 56px);
    line-height: 1.05;
  }

  h2 {
    margin: 0;
    font-size: clamp(22px, 3.2vw, 34px);
  }

  p {
    margin: 0;
    font-size: clamp(16px, 2.1vw, 22px);
  }

  .big-emoji {
    font-size: clamp(54px, 10vw, 110px);
    line-height: 1;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15));
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(140px, 260px));
    gap: 14px;
    justify-content: center;
  }

  .mode-btn {
    min-height: 92px;
    border: none;
    border-radius: 20px;
    background: white;
    box-shadow: var(--shadow);
    font-size: clamp(18px, 2.4vw, 26px);
    font-weight: 800;
    padding: 12px;
    cursor: pointer;
  }

  .mode-btn small {
    display: block;
    font-size: clamp(12px, 1.6vw, 16px);
    font-weight: 700;
    opacity: 0.8;
    margin-top: 6px;
  }

  .game-layout {
    display: grid;
    grid-template-columns: minmax(280px, 1fr) minmax(240px, 330px);
    gap: 12px;
    height: 100%;
    min-height: 0;
  }

  .left-panel, .right-panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    min-height: 0;
  }

  .left-panel {
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 8px;
    min-width: 0;
  }

  .scene-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 44px;
    font-size: clamp(22px, 4vw, 38px);
  }

  .prompt {
    text-align: center;
    font-size: clamp(22px, 3vw, 34px);
    font-weight: 800;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 8px;
  }

  .clock-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  #clockContainer {
    width: var(--clock-size);
    height: var(--clock-size);
    max-width: 100%;
    max-height: 100%;
    position: relative;
  }

  #portalGlow {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 30%, rgba(250,204,21,0.28) 56%, rgba(59,130,246,0.22) 72%, transparent 76%);
    transform: scale(0.9);
  }

  #portalGlow.open {
    animation: portalOpen 1s ease forwards;
  }

  @keyframes portalOpen {
    0% { opacity: 0; transform: scale(0.9) rotate(0deg); }
    35% { opacity: 1; }
    100% { opacity: 1; transform: scale(1.14) rotate(40deg); }
  }

  .right-panel {
    display: grid;
    grid-template-rows: auto auto auto 1fr auto auto;
    gap: 10px;
    min-height: 0;
  }

  .mission-card, .world-card {
    border-radius: 18px;
    background: rgba(255,255,255,0.75);
    padding: 10px;
  }

  .world-display {
    font-size: clamp(36px, 7vw, 70px);
    text-align: center;
    line-height: 1.05;
  }

  .feedback {
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 800;
    border-radius: 18px;
    background: rgba(255,255,255,0.65);
    padding: 8px;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  button.action {
    min-height: 56px;
    border: none;
    border-radius: 18px;
    font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 900;
    cursor: pointer;
    box-shadow: var(--shadow);
  }

  button.primary { background: linear-gradient(180deg, #fcd34d, #f59e0b); }
  button.secondary { background: linear-gradient(180deg, #a7f3d0, #34d399); }
  button.soft { background: linear-gradient(180deg, #dbeafe, #93c5fd); }
  button.ghost { background: linear-gradient(180deg, #f3f4f6, #d1d5db); }

  button:active { transform: translateY(2px) scale(0.995); }

  .stars {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    min-height: 40px;
  }

  .star {
    font-size: clamp(26px, 3.2vw, 38px);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
    transform: scale(0.85);
    opacity: 0.45;
    transition: transform 0.2s, opacity 0.2s;
  }
  .star.on {
    opacity: 1;
    transform: scale(1.05);
  }

  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .small-btn {
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 800;
    background: rgba(255,255,255,0.86);
    box-shadow: var(--shadow);
    cursor: pointer;
  }

  .celebration {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .burst {
    position: absolute;
    font-size: clamp(22px, 4vw, 40px);
    animation: burst 1s ease-out forwards;
  }

  @keyframes burst {
    0% { transform: translate(0,0) scale(0.2) rotate(0deg); opacity: 0; }
    18% { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(240deg); opacity: 0; }
  }

  .hint {
    text-align: center;
    font-size: clamp(15px, 1.8vw, 19px);
    font-weight: 700;
    opacity: 0.85;
  }

  .hidden { display: none !important; }

  @media (max-width: 900px), (max-height: 700px) {
    :root { --clock-size: min(40vh, 74vw); --ui-gap: 8px; }
    .game-layout {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(220px, 1fr) auto;
    }
    .right-panel {
      grid-template-rows: repeat(6, auto);
    }
    .menu-grid {
      grid-template-columns: 1fr;
      width: min(92vw, 420px);
    }
  }

  @media (max-width: 600px) {
    :root { --clock-size: min(34vh, 62vw); --ui-gap: 6px; }
    #app {
      padding-left: 8px;
      padding-right: 8px;
    }
    .badge, .pill {
      padding: 6px 10px;
      font-size: 12px;
    }
    .title-screen {
      gap: 10px;
      grid-template-rows: auto auto 1fr auto;
    }
    .big-emoji {
      font-size: clamp(40px, 13vw, 76px);
    }
    h1 { font-size: clamp(24px, 8vw, 38px); }
    h2 { font-size: clamp(18px, 5vw, 24px); }
    p { font-size: clamp(13px, 3.6vw, 17px); }
    .left-panel, .right-panel, .card {
      padding: 10px;
    }
    .prompt {
      font-size: clamp(18px, 5.2vw, 26px);
      min-height: 52px;
    }
    .scene-row {
      min-height: 30px;
      font-size: clamp(20px, 7vw, 30px);
    }
    .feedback {
      min-height: 44px;
      font-size: clamp(15px, 4vw, 20px);
      padding: 6px;
    }
    .right-panel {
      gap: 8px;
    }
    .controls {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button.action {
      min-height: 46px;
      font-size: clamp(16px, 4.6vw, 21px);
    }
    .small-btn {
      padding: 8px 12px;
      font-size: 13px;
    }
    .stars {
      min-height: 28px;
    }
  }

  @media (max-width: 430px) and (orientation: portrait) {
    :root { --clock-size: min(30vh, 54vw); }
    .badge-row:first-child .badge {
      max-width: 100%;
    }
    .badge-row {
      gap: 6px;
    }
    .world-display {
      font-size: clamp(28px, 10vw, 46px);
    }
    .mission-card, .world-card {
      padding: 8px;
    }
    .hint {
      font-size: 13px;
    }
  }
</style>
</head>
<body class="theme-home">
<div id="app">
  <div class="topbar">
    <div class="badge-row">
      <div class="badge">⏰ Time Traveler Clock</div>
      <div class="pill" id="modePill">Hour Explorer</div>
    </div>
    <div class="badge-row">
      <div class="pill" id="scorePill">⭐ 0</div>
      <div class="pill" id="missionPill">Mission 1</div>
    </div>
  </div>

  <section id="titleScreen" class="screen active">
    <div class="card title-screen">
      <div class="big-emoji">⏰✨🌀</div>
      <div>
        <h1>Time Traveler Clock</h1>
        <p>Set the clock. Open the portal. Visit amazing worlds!</p>
      </div>
      <div class="menu-grid">
        <button class="mode-btn" data-mode="hours">🕒 Hour Explorer<small>Whole hours only</small></button>
        <button class="mode-btn" data-mode="daily">🌞 Daily Time<small>Breakfast, school, bedtime</small></button>
        <button class="mode-btn" data-mode="missions">🌀 Time Missions<small>Pirates, dinos, space</small></button>
        <button class="mode-btn" data-mode="half">🕧 Half Past<small>Big hand points down</small></button>
      </div>
      <p>Tip: tap a number or drag the red hand.</p>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="game-layout">
      <div class="left-panel">
        <div class="scene-row" id="sceneRow">🏠 🌞 🥞</div>
        <div class="prompt" id="promptText">Set the clock to 3 o'clock</div>
        <div class="clock-wrap">
          <div id="clockContainer">
            <div id="portalGlow"></div>
            <svg id="clockSvg" viewBox="0 0 400 400" width="100%" height="100%" aria-label="Analog clock">
              <defs>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
                </filter>
              </defs>
              <circle cx="200" cy="200" r="184" fill="#fffdf7" stroke="#374151" stroke-width="8" filter="url(#shadow)"/>
              <circle cx="200" cy="200" r="168" fill="none" stroke="#fde68a" stroke-width="12" stroke-dasharray="2 10"/>
              <g id="tickMarks"></g>
              <g id="numbers"></g>
              <g id="minuteHandGroup">
                <line id="minuteHand" x1="200" y1="214" x2="200" y2="70" stroke="#2563eb" stroke-width="10" stroke-linecap="round" />
              </g>
              <g id="hourHandGroup">
                <line id="hourHand" x1="200" y1="212" x2="200" y2="110" stroke="#ef4444" stroke-width="16" stroke-linecap="round" />
                <circle id="dragKnob" cx="200" cy="110" r="18" fill="#ef4444" stroke="#991b1b" stroke-width="4" />
              </g>
              <circle cx="200" cy="200" r="18" fill="#111827" />
              <circle cx="200" cy="200" r="8" fill="#f9fafb" />
            </svg>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="mission-card">
          <h2 id="worldName">Home Time</h2>
          <div class="hint" id="hintText">Tap a number to move the red hand.</div>
        </div>
        <div class="world-card">
          <div class="world-display" id="worldDisplay">🏠🌞</div>
        </div>
        <div class="feedback" id="feedbackText">Ready to set the clock?</div>
        <div class="controls">
          <button id="goBtn" class="action primary">GO!</button>
          <button id="hintBtn" class="action soft">Hint</button>
          <button id="nextBtn" class="action secondary">Next</button>
          <button id="homeBtn" class="action ghost">Home</button>
        </div>
        <div>
          <div class="hint">Stars this round</div>
          <div class="stars" id="starsRow"></div>
        </div>
        <div class="controls">
          <button id="spinBtn" class="action soft">Fast Forward</button>
          <button id="soundBtn" class="action ghost">Sound: On</button>
        </div>
      </div>
    </div>
  </section>

  <div class="bottom-bar">
    <button class="small-btn" id="tapModeBtn">Tap + Drag</button>
    <button class="small-btn" id="resetBtn">New Round</button>
  </div>

  <div class="celebration" id="celebration"></div>
</div>

<script>
(() => {
  const state = {
    mode: 'hours',
    missionIndex: 0,
    totalStars: 0,
    roundStars: 0,
    selectedHour: 12,
    selectedMinute: 0,
    answerLocked: false,
    soundOn: true,
    dragActive: false,
    pointerId: null,
    missions: [],
    lastHintActive: false,
  };

  const worlds = {
    home: { name: 'Home Time', emoji: '🏠🌞', className: 'theme-home' },
    dino: { name: 'Dinosaur World', emoji: '🦖🌋', className: 'theme-dino' },
    pirate: { name: 'Pirate Bay', emoji: '🏴‍☠️🗺️', className: 'theme-pirate' },
    space: { name: 'Space Station', emoji: '🚀🌙', className: 'theme-space' },
    castle: { name: 'Castle Time', emoji: '🏰🐉', className: 'theme-castle' }
  };

  const $ = (id) => document.getElementById(id);
  const titleScreen = $('titleScreen');
  const gameScreen = $('gameScreen');
  const modePill = $('modePill');
  const scorePill = $('scorePill');
  const missionPill = $('missionPill');
  const promptText = $('promptText');
  const feedbackText = $('feedbackText');
  const hintText = $('hintText');
  const worldName = $('worldName');
  const worldDisplay = $('worldDisplay');
  const sceneRow = $('sceneRow');
  const portalGlow = $('portalGlow');
  const starsRow = $('starsRow');
  const celebration = $('celebration');
  const clockSvg = $('clockSvg');
  const hourHandGroup = $('hourHandGroup');
  const minuteHandGroup = $('minuteHandGroup');
  const dragKnob = $('dragKnob');
  const tickMarks = $('tickMarks');
  const numbers = $('numbers');
  const tapModeBtn = $('tapModeBtn');

  const modeNames = {
    hours: 'Hour Explorer',
    daily: 'Daily Time',
    missions: 'Time Missions',
    half: 'Half Past'
  };

  const rng = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const shuffle = (arr) => arr.map(v => ({v, r: Math.random()})).sort((a,b) => a.r - b.r).map(x => x.v);

  function updateTopBar() {
    modePill.textContent = modeNames[state.mode];
    scorePill.textContent = `⭐ ${state.totalStars}`;
    missionPill.textContent = `Mission ${state.missionIndex + 1}`;
  }

  function buildClockFace() {
    tickMarks.innerHTML = '';
    numbers.innerHTML = '';

    for (let i = 0; i < 60; i++) {
      const angle = (i * 6 - 90) * Math.PI / 180;
      const isHour = i % 5 === 0;
      const r1 = isHour ? 146 : 156;
      const r2 = 170;
      const x1 = 200 + Math.cos(angle) * r1;
      const y1 = 200 + Math.sin(angle) * r1;
      const x2 = 200 + Math.cos(angle) * r2;
      const y2 = 200 + Math.sin(angle) * r2;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('stroke', isHour ? '#111827' : '#9ca3af');
      line.setAttribute('stroke-width', isHour ? '6' : '2');
      line.setAttribute('stroke-linecap', 'round');
      tickMarks.appendChild(line);
    }

    for (let n = 1; n <= 12; n++) {
      const angle = (n * 30 - 90) * Math.PI / 180;
      const x = 200 + Math.cos(angle) * 124;
      const y = 200 + Math.sin(angle) * 124;
      const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      group.style.cursor = 'pointer';
      group.dataset.hour = n;

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x.toFixed(2));
      circle.setAttribute('cy', y.toFixed(2));
      circle.setAttribute('r', '22');
      circle.setAttribute('fill', '#ffffff');
      circle.setAttribute('stroke', '#d1d5db');
      circle.setAttribute('stroke-width', '3');
      circle.classList.add('hour-target');

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x.toFixed(2));
      text.setAttribute('y', (y + 9).toFixed(2));
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-size', '28');
      text.setAttribute('font-family', 'Arial, Helvetica, sans-serif');
      text.setAttribute('font-weight', '900');
      text.setAttribute('fill', '#111827');
      text.textContent = n;

      group.appendChild(circle);
      group.appendChild(text);
      group.addEventListener('click', () => {
        if (state.answerLocked) return;
        if (state.mode === 'half') {
          setTime(n, 30);
        } else {
          setTime(n, 0);
        }
      });
      numbers.appendChild(group);
    }
  }

  function normalizeHour(hour) {
    let h = hour % 12;
    if (h <= 0) h += 12;
    return h;
  }

  function setTime(hour, minute = 0) {
    state.selectedHour = normalizeHour(hour);
    state.selectedMinute = minute;
    renderClock();
    feedbackText.textContent = state.mode === 'half'
      ? `You set ${state.selectedHour}:${String(state.selectedMinute).padStart(2, '0')}`
      : `You set ${state.selectedHour} o'clock`;
  }

  function renderClock() {
    const minuteAngle = state.selectedMinute * 6;
    const hourAngle = (state.selectedHour % 12) * 30 + state.selectedMinute * 0.5;
    minuteHandGroup.setAttribute('transform', `rotate(${minuteAngle}, 200, 200)`);
    hourHandGroup.setAttribute('transform', `rotate(${hourAngle}, 200, 200)`);

    document.querySelectorAll('.hour-target').forEach((el, idx) => {
      const hour = idx + 1;
      const selected = hour === state.selectedHour;
      el.setAttribute('fill', selected ? '#fde68a' : '#ffffff');
      el.setAttribute('stroke', selected ? '#f59e0b' : '#d1d5db');
      el.setAttribute('stroke-width', selected ? '5' : '3');
    });
  }

  function getModeMissions(mode) {
    const hourOnly = shuffle([
      { prompt: "Set the clock to 3 o'clock", targetHour: 3, targetMinute: 0, world: 'home', scene: '🏠 🌤️ 🧸', hint: 'Look for the number 3.' },
      { prompt: "Set the clock to 7 o'clock", targetHour: 7, targetMinute: 0, world: 'home', scene: '🏠 🌞 🥞', hint: 'Tap the number 7.' },
      { prompt: "Set the clock to 12 o'clock", targetHour: 12, targetMinute: 0, world: 'home', scene: '🏠 ☀️ 🍎', hint: 'The little hand points to 12.' },
      { prompt: "Set the clock to 5 o'clock", targetHour: 5, targetMinute: 0, world: 'home', scene: '🏠 🌇 🚲', hint: 'Find the number 5.' },
      { prompt: "Set the clock to 9 o'clock", targetHour: 9, targetMinute: 0, world: 'home', scene: '🏠 🌞 📚', hint: 'Tap the number 9.' },
      { prompt: "Set the clock to 1 o'clock", targetHour: 1, targetMinute: 0, world: 'home', scene: '🏠 ☁️ 🧩', hint: 'Can you find 1?' },
      { prompt: "Set the clock to 8 o'clock", targetHour: 8, targetMinute: 0, world: 'home', scene: '🏠 🌙 🛏️', hint: 'The little hand should point to 8.' },
    ]).slice(0, 10);

    const daily = shuffle([
      { prompt: "Breakfast time! Set the clock to 7 o'clock", targetHour: 7, targetMinute: 0, world: 'home', scene: '🥞 🥛 🌞', hint: 'Breakfast starts at 7.' },
      { prompt: "School starts at 9 o'clock", targetHour: 9, targetMinute: 0, world: 'home', scene: '🎒 🏫 🌤️', hint: 'Point the little hand to 9.' },
      { prompt: "Lunch time! Set the clock to 12 o'clock", targetHour: 12, targetMinute: 0, world: 'home', scene: '🍎 🥪 ☀️', hint: 'Lunch is at 12.' },
      { prompt: "Bedtime is 8 o'clock", targetHour: 8, targetMinute: 0, world: 'home', scene: '🛏️ 🌙 ⭐', hint: 'Bedtime points to 8.' },
      { prompt: "Story time is 6 o'clock", targetHour: 6, targetMinute: 0, world: 'home', scene: '📖 🧸 🌇', hint: 'Tap the number 6.' },
      { prompt: "Play outside at 4 o'clock", targetHour: 4, targetMinute: 0, world: 'home', scene: '⚽ 🌳 ☀️', hint: 'The little hand should point to 4.' },
      { prompt: "Wake up at 7 o'clock", targetHour: 7, targetMinute: 0, world: 'home', scene: '⏰ 😀 🌞', hint: 'Wake up at 7.' },
    ]).slice(0, 10);

    const missions = shuffle([
      { prompt: "Go to Dinosaur World at 6 o'clock", targetHour: 6, targetMinute: 0, world: 'dino', scene: '🦖 🌋 🥚', hint: 'Find the number 6.' },
      { prompt: "Pirate Bay opens at 4 o'clock", targetHour: 4, targetMinute: 0, world: 'pirate', scene: '🏴‍☠️ 🗺️ 💰', hint: 'Tap 4 to open the portal.' },
      { prompt: "Fly to Space Station at 2 o'clock", targetHour: 2, targetMinute: 0, world: 'space', scene: '🚀 🌙 ⭐', hint: 'The little hand points to 2.' },
      { prompt: "Visit the castle at 10 o'clock", targetHour: 10, targetMinute: 0, world: 'castle', scene: '🏰 🐉 👑', hint: 'Find the number 10.' },
      { prompt: "The dinosaur eggs hatch at 1 o'clock", targetHour: 1, targetMinute: 0, world: 'dino', scene: '🥚 🦕 🌿', hint: 'Point to 1.' },
      { prompt: "Treasure time is 5 o'clock", targetHour: 5, targetMinute: 0, world: 'pirate', scene: '💰 ⚓ 🌊', hint: 'Tap the number 5.' },
      { prompt: "The moon robot wakes at 8 o'clock", targetHour: 8, targetMinute: 0, world: 'space', scene: '🤖 🌙 ✨', hint: 'The little hand goes to 8.' },
      { prompt: "Dragon snack time is 3 o'clock", targetHour: 3, targetMinute: 0, world: 'castle', scene: '🐉 🍎 🔥', hint: 'Look for the number 3.' },
    ]).slice(0, 10);

    const half = shuffle([
      { prompt: "Set the clock to half past 3", targetHour: 3, targetMinute: 30, world: 'home', scene: '🏠 🕞 🌤️', hint: 'Big hand down. Little hand halfway after 3.' },
      { prompt: "Set the clock to half past 7", targetHour: 7, targetMinute: 30, world: 'home', scene: '🏠 🕢 🥞', hint: 'Big hand down. Little hand halfway after 7.' },
      { prompt: "Pirate Bay at half past 4", targetHour: 4, targetMinute: 30, world: 'pirate', scene: '🏴‍☠️ 🕟 🌊', hint: 'Big hand points down to 6.' },
      { prompt: "Dino time is half past 6", targetHour: 6, targetMinute: 30, world: 'dino', scene: '🦖 🕡 🌋', hint: 'Half past means :30.' },
      { prompt: "Space Station at half past 2", targetHour: 2, targetMinute: 30, world: 'space', scene: '🚀 🕝 ⭐', hint: 'Big hand down, little hand after 2.' },
      { prompt: "Set the clock to half past 9", targetHour: 9, targetMinute: 30, world: 'castle', scene: '🏰 🕤 👑', hint: 'Halfway after 9.' },
    ]).slice(0, 10);

    if (mode === 'daily') return daily;
    if (mode === 'missions') return missions;
    if (mode === 'half') return half;
    return hourOnly;
  }

  function startMode(mode) {
    state.mode = mode;
    state.missionIndex = 0;
    state.roundStars = 0;
    state.answerLocked = false;
    state.missions = getModeMissions(mode);
    titleScreen.classList.remove('active');
    gameScreen.classList.add('active');
    tapModeBtn.textContent = mode === 'half' ? 'Tap + Drag (:30 mode)' : 'Tap + Drag';
    buildStars();
    loadMission();
    updateTopBar();
  }

  function buildStars() {
    starsRow.innerHTML = '';
    for (let i = 0; i < Math.max(5, state.missions.length); i++) {
      const star = document.createElement('div');
      star.className = 'star' + (i < state.roundStars ? ' on' : '');
      star.textContent = '⭐';
      starsRow.appendChild(star);
    }
  }

  function updateStars() {
    [...starsRow.children].forEach((star, i) => {
      star.classList.toggle('on', i < state.roundStars);
    });
  }

  function loadMission() {
    state.answerLocked = false;
    state.lastHintActive = false;
    portalGlow.classList.remove('open');
    const mission = state.missions[state.missionIndex % state.missions.length];
    const world = worlds[mission.world];
    document.body.className = world.className;
    promptText.textContent = mission.prompt;
    hintText.textContent = state.mode === 'half'
      ? 'Half past means the big hand points down to 6.'
      : 'Tap a number to move the red hand.';
    feedbackText.textContent = 'Ready to set the clock?';
    worldName.textContent = world.name;
    worldDisplay.textContent = world.emoji;
    sceneRow.textContent = mission.scene;
    setTime(state.mode === 'half' ? 12 : 12, state.mode === 'half' ? 30 : 0);
    if (state.mode !== 'half') setTime(12, 0);
    updateTopBar();
  }

  function celebrate() {
    portalGlow.classList.remove('open');
    void portalGlow.offsetWidth;
    portalGlow.classList.add('open');

    const emojis = ['⭐', '✨', '🌀', '🌟', '💫'];
    celebration.innerHTML = '';
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div');
      b.className = 'burst';
      b.textContent = emojis[i % emojis.length];
      b.style.left = '50%';
      b.style.top = '50%';
      b.style.setProperty('--dx', `${(Math.random() * 360 - 180).toFixed(0)}px`);
      b.style.setProperty('--dy', `${(Math.random() * 260 - 130).toFixed(0)}px`);
      b.style.animationDelay = `${Math.random() * 0.15}s`;
      celebration.appendChild(b);
    }
    setTimeout(() => celebration.innerHTML = '', 1200);
  }

  function missionIsCorrect() {
    const mission = state.missions[state.missionIndex % state.missions.length];
    return state.selectedHour === mission.targetHour && state.selectedMinute === mission.targetMinute;
  }

  function checkAnswer() {
    if (state.answerLocked) return;
    const mission = state.missions[state.missionIndex % state.missions.length];
    if (missionIsCorrect()) {
      state.answerLocked = true;
      state.roundStars += 1;
      state.totalStars += 1;
      updateTopBar();
      updateStars();
      feedbackText.textContent = `Great job! Portal open for ${worlds[mission.world].name}!`;
      playSuccess();
      celebrate();
    } else {
      feedbackText.textContent = state.mode === 'half'
        ? 'Not yet. Remember: half past means the big hand points down.'
        : 'Not yet. Try again!';
      playTryAgain();
      wiggleClock();
    }
  }

  function nextMission() {
    state.missionIndex += 1;
    if (state.missionIndex >= state.missions.length) {
      feedbackText.textContent = 'Round complete! Starting a new round.';
      state.missions = getModeMissions(state.mode);
      state.missionIndex = 0;
      state.roundStars = 0;
      buildStars();
    }
    loadMission();
  }

  function showHint() {
    const mission = state.missions[state.missionIndex % state.missions.length];
    feedbackText.textContent = mission.hint;
    state.lastHintActive = true;
    highlightHour(mission.targetHour);
    if (state.mode === 'half') {
      minuteHandGroup.animate([
        { transform: `rotate(${state.selectedMinute * 6}deg)` },
        { transform: 'rotate(180deg)' },
        { transform: 'rotate(180deg)' },
        { transform: `rotate(${state.selectedMinute * 6}deg)` }
      ], { duration: 900, easing: 'ease-in-out' });
    }
  }

  function highlightHour(hour) {
    document.querySelectorAll('.hour-target').forEach((el, idx) => {
      const isTarget = idx + 1 === hour;
      if (isTarget) {
        el.animate([
          { transform: 'scale(1)', fill: '#fde68a' },
          { transform: 'scale(1.15)', fill: '#fcd34d' },
          { transform: 'scale(1)', fill: '#fde68a' }
        ], { duration: 850, easing: 'ease-in-out' });
      }
    });
  }

  function wiggleClock() {
    clockSvg.animate([
      { transform: 'translateX(0px)' },
      { transform: 'translateX(-8px)' },
      { transform: 'translateX(8px)' },
      { transform: 'translateX(-6px)' },
      { transform: 'translateX(0px)' }
    ], { duration: 360, easing: 'ease-out' });
  }

  function spinTime() {
    const frames = [];
    for (let i = 0; i <= 12; i++) {
      frames.push({ transform: `rotate(${i * 120}deg)` });
    }
    minuteHandGroup.animate(frames, { duration: 1400, easing: 'ease-in-out' });
    hourHandGroup.animate(frames.map((f, i) => ({ transform: `rotate(${i * 35}deg)` })), { duration: 1400, easing: 'ease-in-out' });
    playSpin();
  }

  function pointerToTime(clientX, clientY) {
    const rect = clockSvg.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    let angle = Math.atan2(y - cy, x - cx) * 180 / Math.PI;
    angle = (angle + 90 + 360) % 360;
    const rawHour = Math.round(angle / 30) || 12;
    const hour = normalizeHour(rawHour);
    if (state.mode === 'half') {
      setTime(hour, 30);
    } else {
      setTime(hour, 0);
    }
  }

  function onPointerDown(e) {
    if (state.answerLocked) return;
    state.dragActive = true;
    state.pointerId = e.pointerId;
    dragKnob.setPointerCapture?.(e.pointerId);
    pointerToTime(e.clientX, e.clientY);
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!state.dragActive || e.pointerId !== state.pointerId) return;
    pointerToTime(e.clientX, e.clientY);
    e.preventDefault();
  }

  function onPointerUp(e) {
    if (e.pointerId !== state.pointerId) return;
    state.dragActive = false;
    state.pointerId = null;
    e.preventDefault();
  }

  function showHome() {
    gameScreen.classList.remove('active');
    titleScreen.classList.add('active');
    document.body.className = 'theme-home';
    feedbackText.textContent = 'Ready to set the clock?';
  }

  function newRound() {
    state.roundStars = 0;
    state.missionIndex = 0;
    state.missions = getModeMissions(state.mode);
    buildStars();
    loadMission();
  }

  function playTone(freq, duration, type = 'sine', gainValue = 0.05, when = 0) {
    if (!state.soundOn) return;
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    if (!playTone.ctx) playTone.ctx = new AudioCtx();
    const ctx = playTone.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = gainValue;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const start = ctx.currentTime + when;
    osc.start(start);
    gain.gain.setValueAtTime(gainValue, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.stop(start + duration);
  }

  function playSuccess() {
    playTone(523.25, 0.18, 'triangle', 0.05, 0);
    playTone(659.25, 0.18, 'triangle', 0.05, 0.12);
    playTone(783.99, 0.32, 'triangle', 0.05, 0.24);
  }

  function playTryAgain() {
    playTone(240, 0.12, 'sawtooth', 0.035, 0);
    playTone(220, 0.18, 'sawtooth', 0.03, 0.08);
  }

  function playSpin() {
    for (let i = 0; i < 7; i++) {
      playTone(240 + i * 55, 0.08, 'square', 0.02, i * 0.07);
    }
  }

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => startMode(btn.dataset.mode));
  });

  $('goBtn').addEventListener('click', checkAnswer);
  $('nextBtn').addEventListener('click', nextMission);
  $('hintBtn').addEventListener('click', showHint);
  $('homeBtn').addEventListener('click', showHome);
  $('spinBtn').addEventListener('click', spinTime);
  $('soundBtn').addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    $('soundBtn').textContent = `Sound: ${state.soundOn ? 'On' : 'Off'}`;
    if (state.soundOn) playTone(440, 0.08, 'triangle', 0.03, 0);
  });
  $('resetBtn').addEventListener('click', () => {
    if (gameScreen.classList.contains('active')) newRound();
  });
  tapModeBtn.addEventListener('click', () => {
    feedbackText.textContent = state.mode === 'half'
      ? 'Tap a number or drag the red hand. Big hand stays down.'
      : 'Tap a number or drag the red hand.';
  });

  dragKnob.addEventListener('pointerdown', onPointerDown);
  clockSvg.addEventListener('pointermove', onPointerMove);
  clockSvg.addEventListener('pointerup', onPointerUp);
  clockSvg.addEventListener('pointercancel', onPointerUp);

  buildClockFace();
  setTime(12, 0);
  buildStars();
  updateTopBar();
})();
</script>
</body>
</html>
