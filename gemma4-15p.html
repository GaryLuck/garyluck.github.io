<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Puzzle Game</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --tile-color: #ffffff;
            --text-color: #333;
            --accent-color: #4a90e2;
            --empty-color: #cbd5e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .stats {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* The Grid Container */
        .puzzle-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            background-color: #a0aec0;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        /* Individual Tiles */
        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--tile-color);
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-color);
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            user-select: none;
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile.empty {
            background-color: var(--empty-color);
            cursor: default;
        }

        button {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        #message {
            margin-top: 20px;
            color: #2f855a;
            font-weight: bold;
            height: 1.2em;
        }
    </style>
</head>
<body>

    <h1>15 Puzzle</h1>
    <div class="stats">Moves: <span id="move-count">0</span></div>

    <div class="puzzle-container" id="grid">
        <!-- Tiles generated by JavaScript -->
    </div>

    <div id="message"></div>

    <button onclick="shuffleGame()">New Game / Shuffle</button>

    <script>
        const gridElement = document.getElementById('grid');
        const moveDisplay = document.getElementById('move-count');
        const messageDisplay = document.getElementById('message');

        let tiles = []; // Array to store the current state [1, 2, ... 15, null]
        let moves = 0;

        // Initialize the game
        function initGame() {
            tiles = [...Array(15).keys()].map(i => i + 1);
            tiles.push(null); // The last slot is the empty space
            render();
        }

        // Render the grid to the DOM
        function render() {
            gridElement.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.classList.add('tile');
                if (tile === null) {
                    div.classList.add('empty');
                    div.textContent = '';
                } else {
                    div.textContent = tile;
                    div.onclick = () => handleMove(index);
                }
                gridElement.appendChild(div);
            });
        }

        // Handle clicking a tile
        function handleMove(index) {
            const emptyIndex = tiles.indexOf(null);

            // Check if the clicked tile is adjacent to the empty space
            const row = Math.floor(index / 4);
            const col = index % 4;
            const emptyRow = Math.floor(emptyIndex / 4);
            const emptyCol = emptyIndex % 4;

            const isAdjacent = (
                (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                (Math.abs(col - emptyCol) === 1 && row === emptyRow)
            );

            if (isAdjacent) {
                // Swap elements in array
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moves++;
                moveDisplay.innerText = moves;
                render();
                checkWin();
            }
        }

        // Check if the puzzle is solved (1, 2, 3... 15 followed by null)
        function checkWin() {
            const isWin = tiles.every((tile, i) => {
                if (i === 15) return tile === null;
                return tile === i + 1;
            });

            if (isWin && moves > 0) {
                messageDisplay.innerText = "Congratulations! You solved it!";
            }
        }

        // Shuffle the board
        // Note: To ensure a puzzle is solvable, we don't just shuffle random numbers.
        // We start from a solved state and perform many random "legal" moves.
        function shuffleGame() {
            // Reset values
            tiles = [...Array(15).keys()].map(i => i + 1);
            tiles.push(null);
            moves = 0;
            moveDisplay.innerText = moves;
            messageDisplay.innerText = "";

            // Perform 200 random legal shuffles
            for (let i = 0; i < 200; i++) {
                const emptyIndex = tiles.indexOf(null);
                const row = Math.floor(emptyIndex / 4);
                const col = emptyIndex % 4;

                const neighbors = [];
                if (row > 0) neighbors.push(emptyIndex - 4); // Top
                if (row < 3) neighbors.push(emptyIndex + 4);    // Bottom
                if (col > 0) neighbors.push(emptyIndex - 1);     // Left
                if (col < 3) neighbors.push(emptyIndex + 1);     // Right

                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];

                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
            }

            render();
        }

        // Start the game on load
        initGame();
    </script>
</body>
</html>
