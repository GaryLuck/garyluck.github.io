<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bamboo Quest Prototype</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents the page from scrolling while tilting */
            background-color: #2c3e50;
            font-family: sans-serif;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

<div id="overlay">
    <h2>Bamboo Quest Prototype</h2>
    <p>To roll the ball, you must allow access to your device's motion sensors.</p>
    <button id="startButton">Enable Tilt & Start</button>
</div>

<script>
    // --- 1. SETUP PHYSICS ENGINE ---
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite;

    const engine = Engine.create();

    // --- 2. SETUP VISUAL RENDERING ---
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false,
            background: '#8B4513' // Wood-like background color
        }
    });

    // --- 3. CREATE THE MAZE BOUNDARIES & OBSTACLES ---
    const wallOptions = { isStatic: true, render: { fillStyle: '#DAA520' } };
    const thickness = 40;
    const width = window.innerWidth;
    const height = window.innerHeight;

    // Create the outer walls so the ball doesn't fall off the screen
    const ground = Bodies.rectangle(width / 2, height, width, thickness, wallOptions);
    const ceiling = Bodies.rectangle(width / 2, 0, width, thickness, wallOptions);
    const leftWall = Bodies.rectangle(0, height / 2, thickness, height, wallOptions);
    const rightWall = Bodies.rectangle(width, height / 2, thickness, height, wallOptions);

    // Add a couple of basic inner walls to bounce around
    const obstacle1 = Bodies.rectangle(width / 3, height / 3, 250, 20, wallOptions);
    const obstacle2 = Bodies.rectangle((width / 3) * 2, (height / 3) * 2, 250, 20, wallOptions);

    // --- 4. CREATE THE BALL ---
    const ball = Bodies.circle(width / 2, height / 2, 25, {
        restitution: 0.6, // Bounciness
        friction: 0.001,  // Low friction so it rolls easily
        render: { fillStyle: '#C0C0C0' } // Silver ball
    });

    // Add everything to the physics world
    Composite.add(engine.world, [ground, ceiling, leftWall, rightWall, obstacle1, obstacle2, ball]);

    // --- 5. TILT LOGIC (DEVICE SENSORS) ---
    function handleOrientation(event) {
        let x = event.gamma;  // Left-to-right tilt in degrees [-90, 90]
        let y = event.beta;   // Front-to-back tilt in degrees [-180, 180]

        // Cap the values to prevent erratic behavior if flipped over
        if (x >  90) { x =  90};
        if (x < -90) { x = -90};

        // Convert the iPad tilt angles into gravity for the physics engine.
        // Tweak the "30" divisor to make the ball roll faster or slower.
        engine.gravity.x = x / 30;
        engine.gravity.y = y / 30;
    }

    // --- 6. APPLE SENSOR PERMISSION & START GAME ---
    document.getElementById('startButton').addEventListener('click', function() {
        // Apple requires explicit user permission to access motion sensors via a button click
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        startGame();
                    } else {
                        alert("Permission denied. The maze needs tilt access to work.");
                    }
                })
                .catch(console.error);
        } else {
            // Fallback for older devices or non-Apple tablets
            window.addEventListener('deviceorientation', handleOrientation);
            startGame();
        }
    });

    function startGame() {
        // Hide the start menu and run the physics engine
        document.getElementById('overlay').style.display = 'none';
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);
    }

    // Keep the canvas sized properly if the iPad is rotated
    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
    });

</script>
</body>
</html>
