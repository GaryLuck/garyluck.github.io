
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Simple Talking Clock</title>
<style>
html,body{
    margin:0;
    height:100%;
    font-family: Arial, Helvetica, sans-serif;
    background:#87CEFA;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

#app{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
}

#clock{
    width:min(80vw,80vh);
    height:min(80vw,80vh);
}

button{
    font-size:24px;
    padding:14px 24px;
    border:none;
    border-radius:14px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}
</style>
</head>
<body>

<div id="app">

<svg id="clock" viewBox="0 0 300 300">

<!-- clock face -->
<circle cx="150" cy="150" r="140" fill="white" stroke="black" stroke-width="6"/>

<!-- numbers -->
<g id="numbers" font-size="26" font-weight="bold" text-anchor="middle" dominant-baseline="middle">
</g>

<!-- hour hand -->
<line id="hourHand"
      x1="150"
      y1="150"
      x2="150"
      y2="70"
      stroke="black"
      stroke-width="8"
      stroke-linecap="round"
/>

<!-- center -->
<circle cx="150" cy="150" r="6" fill="black"/>

</svg>

<button id="speakBtn">🔊 Say Time</button>

</div>

<script>

const centerX = 150
const centerY = 150
let hour = 12

const hourHand = document.getElementById("hourHand")
const numbersGroup = document.getElementById("numbers")

// draw numbers
for(let i=1;i<=12;i++){
    const angle = (i/12)*2*Math.PI - Math.PI/2
    const r = 110
    const x = centerX + Math.cos(angle)*r
    const y = centerY + Math.sin(angle)*r

    const text = document.createElementNS("http://www.w3.org/2000/svg","text")
    text.setAttribute("x",x)
    text.setAttribute("y",y)
    text.textContent = i
    text.style.cursor="pointer"

    text.addEventListener("click",()=>{
        setHour(i)
    })

    numbersGroup.appendChild(text)
}

function setHour(h){
    hour = h
    const angle = h * 30
    hourHand.setAttribute("transform","rotate("+angle+" 150 150)")
}

setHour(12)

// dragging
let dragging = false

document.getElementById("clock").addEventListener("pointerdown",e=>{
    dragging=true
    moveHand(e)
})

window.addEventListener("pointerup",()=>dragging=false)

window.addEventListener("pointermove",e=>{
    if(dragging) moveHand(e)
})

function moveHand(e){

    const rect = document.getElementById("clock").getBoundingClientRect()
    const x = e.clientX - rect.left
    const y = e.clientY - rect.top

    const dx = x - rect.width/2
    const dy = y - rect.height/2

    let angle = Math.atan2(dy,dx) * 180/Math.PI + 90
    if(angle<0) angle+=360

    const h = Math.round(angle/30) || 12
    setHour(h)
}

// speech
document.getElementById("speakBtn").addEventListener("click",()=>{

    let phrase

    if(hour===12)
        phrase = "twelve o'clock"
    else
        phrase = hour + " o'clock"

    const utter = new SpeechSynthesisUtterance(phrase)
    utter.rate = 0.9
    speechSynthesis.cancel()
    speechSynthesis.speak(utter)
})

</script>

</body>
</html>
