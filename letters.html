<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Sentence Train</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none; /* Prevents accidental text highlighting */
        }

        h1 { color: #006064; font-size: 2.5em; margin-bottom: 5px; }
        p { color: #00838f; font-size: 1.2em; margin-top: 0; }

        #game-area {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Train Styles */
        #train-track {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 6px solid #5d4037; /* The track */
            margin-bottom: 40px;
            min-height: 120px;
        }

        .locomotive {
            font-size: 80px;
            line-height: 1;
            margin-bottom: -15px; /* Aligns emoji with CSS boxes */
        }

        .boxcar {
            width: 100px;
            height: 80px;
            background-color: #ffcc80;
            border: 4px solid #ef6c00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* Draw train wheels using CSS */
        .boxcar::after, .boxcar::before {
            content: '';
            position: absolute;
            bottom: -15px;
            width: 20px;
            height: 20px;
            background-color: #424242;
            border-radius: 50%;
            border: 3px solid #9e9e9e;
        }
        .boxcar::before { left: 10px; }
        .boxcar::after { right: 10px; }

        .boxcar:active { transform: scale(0.95); }
        .boxcar.empty { background-color: #ffe0b2; border-style: dashed; }

        /* Word Bank Styles */
        #word-bank {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            min-height: 60px;
        }

        .word-block {
            background-color: #4fc3f7;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #0288d1;
            transition: all 0.1s;
        }

        .word-block:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0288d1;
        }

        /* Animation and Reward */
        #reward-area {
            font-size: 60px;
            height: 80px;
            margin: 20px 0;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #next-btn {
            background-color: #66bb6a;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
            box-shadow: 0 5px 0 #388e3c;
            font-family: inherit;
        }
        #next-btn:active { transform: translateY(5px); box-shadow: none; }

    </style>
</head>
<body>

    <h1>Silly Sentence Train</h1>
    <p>Click the words to build the sentence!</p>

    <div id="game-area">
        <div id="train-track">
            <div class="locomotive">🚂</div>
            </div>

        <div id="reward-area"></div>
        <div id="word-bank"></div>
        <button id="next-btn" onclick="nextLevel()">Next Train! ➔</button>
    </div>

    <script>
        // --- GAME DATA ---
        // You can easily add more sentences here!
        const levels = [
            { words: ["The", "dog", "can", "dig"], reward: "🐶 🦴" },
            { words: ["I", "see", "a", "bug"], reward: "👀 🐛" },
            { words: ["A", "cat", "is", "mad"], reward: "😾 💢" },
            { words: ["The", "pig", "is", "big"], reward: "🐷 🐖" },
            { words: ["He", "has", "a", "hat"], reward: "👦 🎩" }
        ];

        let currentLevel = 0;
        let targetSentence = [];
        let trainSlots = [];

        // --- AUDIO ENGINE ---
        // Generates sounds purely from math, no files needed!
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pop') { // Click sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'ding') { // Success sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'toot') { // Train whistle
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                osc.frequency.setValueAtTime(450, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        function speakWord(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85; // Slightly slower for early readers
            utterance.pitch = 1.1; 
            window.speechSynthesis.speak(utterance);
        }

        // --- GAME LOGIC ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadLevel() {
            targetSentence = levels[currentLevel].words;
            trainSlots = new Array(targetSentence.length).fill(null);
            
            document.getElementById('reward-area').innerText = "";
            document.getElementById('next-btn').style.display = 'none';

            renderTrain();
            
            // Create a shuffled copy of the words for the bank
            let shuffledWords = shuffleArray([...targetSentence]);
            renderWordBank(shuffledWords);
        }

        function renderTrain() {
            const track = document.getElementById('train-track');
            // Keep only the locomotive, remove old boxcars
            track.innerHTML = '<div class="locomotive" onclick="playSound(\'toot\')">🚂</div>';
            
            for (let i = 0; i < trainSlots.length; i++) {
                const car = document.createElement('div');
                car.className = 'boxcar' + (trainSlots[i] ? '' : ' empty');
                car.innerText = trainSlots[i] || '';
                
                // If a word is in the car, clicking it sends it back to the bank
                if (trainSlots[i]) {
                    car.onclick = () => removeWordFromTrain(i, trainSlots[i]);
                }
                track.appendChild(car);
            }
        }

        function renderWordBank(words) {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            words.forEach(word => {
                if (word !== null) {
                    const block = document.createElement('div');
                    block.className = 'word-block';
                    block.innerText = word;
                    block.onclick = () => addWordToTrain(word);
                    bank.appendChild(block);
                }
            });
        }

        function addWordToTrain(word) {
            // Find the first empty slot
            const emptyIndex = trainSlots.indexOf(null);
            if (emptyIndex !== -1) {
                playSound('pop');
                speakWord(word);
                trainSlots[emptyIndex] = word;
                
                // Remove word from bank display
                const currentBankWords = Array.from(document.getElementById('word-bank').children).map(el => el.innerText);
                const wordIndex = currentBankWords.indexOf(word);
                currentBankWords.splice(wordIndex, 1);
                
                renderTrain();
                renderWordBank(currentBankWords);
                checkWin();
            }
        }

        function removeWordFromTrain(index, word) {
            playSound('pop');
            trainSlots[index] = null;
            
            // Put word back in bank
            const currentBankWords = Array.from(document.getElementById('word-bank').children).map(el => el.innerText);
            currentBankWords.push(word);
            
            renderTrain();
            renderWordBank(currentBankWords);
        }

        function checkWin() {
            // Check if all slots are full
            if (!trainSlots.includes(null)) {
                // Check if the order is correct
                if (trainSlots.join(' ') === targetSentence.join(' ')) {
                    // Win!
                    setTimeout(() => {
                        playSound('ding');
                        setTimeout(() => playSound('toot'), 400);
                        speakWord(targetSentence.join(' ')); // Read whole sentence
                        document.getElementById('reward-area').innerText = levels[currentLevel].reward;
                        document.getElementById('next-btn').style.display = 'block';
                        document.getElementById('word-bank').innerHTML = ''; // Clear bank entirely
                    }, 300);
                } else {
                    // Train is full but wrong. Read the silly sentence they made!
                    speakWord("Uh oh, that says: " + trainSlots.join(' '));
                }
            }
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel >= levels.length) {
                currentLevel = 0; // Loop back to start
            }
            loadLevel();
        }

        // Start the game!
        loadLevel();

    </script>
</body>
</html>
