<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elevator Algorithm Demo</title>
  <style>
    :root {
      --bg: #1a1d26;
      --panel: #252a36;
      --floor: #2d3344;
      --accent: #5b8cff;
      --accent-dim: #3d5a9e;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --shaft: #0f1218;
      --car: #3a4559;
      --person: #c9a227;
      --person-wait: #6eb5a8;
      --up: #4ade80;
      --down: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #2a3142 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }

    h1 {
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.02em;
      margin: 0 0 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .stage {
      display: flex;
      gap: 1.5rem;
      align-items: stretch;
      max-width: 720px;
      width: 100%;
    }

    .building {
      flex: 1;
      background: var(--panel);
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .floors-wrap {
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
    }

    .floor-row {
      display: grid;
      grid-template-columns: 52px 1fr;
      align-items: center;
      gap: 10px;
      min-height: 72px;
      background: var(--floor);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .floor-label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
    }

    .waiting-area {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-height: 36px;
    }

    .waiting-area .hint {
      font-size: 0.7rem;
      color: var(--muted);
      width: 100%;
    }

    .shaft-stack {
      position: relative;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    .shaft-cell {
      position: absolute;
      inset: 0;
      background: var(--shaft);
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .elevator-car {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 64px;
      bottom: 4px;
      background: linear-gradient(180deg, #4a5568 0%, var(--car) 100%);
      border-radius: 4px;
      border: 2px solid rgba(91, 140, 255, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 4px;
      transition: bottom 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .elevator-car .arrow-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .arrow {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      opacity: 0.25;
      transition: opacity 0.2s;
    }

    .arrow.active.up {
      opacity: 1;
      color: var(--up);
      background: rgba(74, 222, 128, 0.15);
    }

    .arrow.active.down {
      opacity: 1;
      color: var(--down);
      background: rgba(248, 113, 113, 0.15);
    }

    .car-passengers {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: center;
      flex: 1;
      align-content: center;
    }

    .person {
      width: 14px;
      height: 18px;
      border-radius: 6px 6px 3px 3px;
      position: relative;
      flex-shrink: 0;
    }

    .person.in-car {
      background: var(--person);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .person.waiting {
      background: var(--person-wait);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .person::after {
      content: attr(data-dest);
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--muted);
      white-space: nowrap;
    }

    .shaft-column {
      width: 120px;
    }

    .legend {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.5;
    }

    .status-bar {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <h1>Elevator algorithm</h1>
  <p class="subtitle">SCAN-style service: random arrivals, one direction until no more stops, then reverse.</p>

  <div class="stage">
    <div class="building">
      <div class="floors-wrap" id="floorsWrap"></div>
    </div>
    <div class="building" style="flex: 0 0 auto; width: 140px;">
      <div style="font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; text-align: center;">Shaft</div>
      <div class="shaft-column" id="shaftColumn"></div>
    </div>
  </div>

  <p class="legend">
    Small labels under figures show destination floor. Waiting passengers (teal) board when the car stops and their ride matches the current scan direction.
  </p>
  <p class="status-bar" id="statusBar"></p>

  <script>
    (function () {
      const NUM_FLOORS = 4;
      const FLOOR_HEIGHT_PX = 72;
      const GAP = 8;
      const SHAFT_HEIGHT =
        NUM_FLOORS * (FLOOR_HEIGHT_PX + GAP) - GAP;
      const MOVE_MS = 650;
      const ARRIVAL_MIN = 1200;
      const ARRIVAL_MAX = 3800;
      const DOOR_MS = 400;

      /** @type {number} 0 = bottom floor */
      let currentFloor = 0;
      /** @type {1|-1} */
      let direction = 1;
      /** @type {{ id: number, dest: number }[]} */
      let inCar = [];
      /** @type {{ id: number, dest: number }[][]} */
      let waiting = Array.from({ length: NUM_FLOORS }, () => []);
      let nextPersonId = 1;

      const floorsWrap = document.getElementById("floorsWrap");
      const shaftColumn = document.getElementById("shaftColumn");
      const statusBar = document.getElementById("statusBar");

      /** @type {HTMLElement | null} */
      let elevatorEl = null;
      let shaftBuilt = false;

      function randomDest(fromFloor) {
        let d = fromFloor;
        while (d === fromFloor) {
          d = Math.floor(Math.random() * NUM_FLOORS);
        }
        return d;
      }

      function scheduleArrival() {
        const delay = ARRIVAL_MIN + Math.random() * (ARRIVAL_MAX - ARRIVAL_MIN);
        setTimeout(() => {
          const floor = Math.floor(Math.random() * NUM_FLOORS);
          const dest = randomDest(floor);
          waiting[floor].push({ id: nextPersonId++, dest });
          render();
          scheduleArrival();
        }, delay);
      }

      function collectStops() {
        const stops = new Set();
        inCar.forEach((p) => stops.add(p.dest));
        waiting.forEach((list, f) => {
          if (list.length) stops.add(f);
        });
        return stops;
      }

      function nextStopInDirection() {
        const stops = collectStops();
        if (stops.size === 0) return null;

        if (direction === 1) {
          let best = null;
          stops.forEach((f) => {
            if (f > currentFloor && (best === null || f < best)) best = f;
          });
          if (best !== null) return best;
          let low = null;
          stops.forEach((f) => {
            if (f < currentFloor && (low === null || f > low)) low = f;
          });
          return low;
        }

        let best = null;
        stops.forEach((f) => {
          if (f < currentFloor && (best === null || f > best)) best = f;
        });
        if (best !== null) return best;
        let high = null;
        stops.forEach((f) => {
          if (f > currentFloor && (high === null || f < high)) high = f;
        });
        return high;
      }

      function setCarPosition(el) {
        const bottomPx = currentFloor * (FLOOR_HEIGHT_PX + GAP) + 4;
        el.style.bottom = bottomPx + "px";
      }

      function buildShaftOnce() {
        if (shaftBuilt) return;
        const stack = document.createElement("div");
        stack.className = "shaft-stack";
        stack.style.height = SHAFT_HEIGHT + "px";

        const cell = document.createElement("div");
        cell.className = "shaft-cell";

        elevatorEl = document.createElement("div");
        elevatorEl.className = "elevator-car";
        elevatorEl.id = "elevatorCar";
        setCarPosition(elevatorEl);

        const arrowRow = document.createElement("div");
        arrowRow.className = "arrow-row";
        const upA = document.createElement("span");
        upA.className = "arrow";
        upA.id = "arrowUp";
        upA.textContent = "▲";
        upA.title = "Going up";
        const downA = document.createElement("span");
        downA.className = "arrow";
        downA.id = "arrowDown";
        downA.textContent = "▼";
        downA.title = "Going down";
        arrowRow.appendChild(upA);
        arrowRow.appendChild(downA);

        const inside = document.createElement("div");
        inside.className = "car-passengers";
        inside.id = "carPassengers";

        elevatorEl.appendChild(arrowRow);
        elevatorEl.appendChild(inside);
        cell.appendChild(elevatorEl);
        stack.appendChild(cell);
        shaftColumn.appendChild(stack);
        shaftBuilt = true;
      }

      function renderFloors() {
        floorsWrap.innerHTML = "";

        for (let f = 0; f < NUM_FLOORS; f++) {
          const row = document.createElement("div");
          row.className = "floor-row";
          row.dataset.floor = String(f);

          const label = document.createElement("div");
          label.className = "floor-label";
          label.textContent = f + 1;

          const waitArea = document.createElement("div");
          waitArea.className = "waiting-area";
          if (waiting[f].length === 0) {
            const hint = document.createElement("span");
            hint.className = "hint";
            hint.textContent = f === 0 ? "Lobby" : "—";
            waitArea.appendChild(hint);
          } else {
            waiting[f].forEach((p) => {
              const fig = document.createElement("div");
              fig.className = "person waiting";
              fig.dataset.dest = String(p.dest + 1);
              fig.title = "To floor " + (p.dest + 1);
              waitArea.appendChild(fig);
            });
          }

          row.appendChild(label);
          row.appendChild(waitArea);
          floorsWrap.appendChild(row);
        }
      }

      function updateArrows() {
        const up = document.getElementById("arrowUp");
        const down = document.getElementById("arrowDown");
        if (!up || !down) return;
        up.classList.remove("active", "up", "down");
        down.classList.remove("active", "up", "down");
        if (direction === 1) {
          up.classList.add("active", "up");
        } else {
          down.classList.add("active", "down");
        }
      }

      function renderCarPassengers() {
        const inside = document.getElementById("carPassengers");
        if (!inside) return;
        inside.innerHTML = "";
        inCar.forEach((p) => {
          const fig = document.createElement("div");
          fig.className = "person in-car";
          fig.dataset.dest = String(p.dest + 1);
          fig.title = "To floor " + (p.dest + 1);
          inside.appendChild(fig);
        });
      }

      function syncElevator() {
        buildShaftOnce();
        if (elevatorEl) setCarPosition(elevatorEl);
        updateArrows();
        renderCarPassengers();
      }

      function render() {
        renderFloors();
        syncElevator();
        const dirStr = direction === 1 ? "UP ▲" : "DOWN ▼";
        const w = waiting.reduce((n, list) => n + list.length, 0);
        statusBar.textContent =
          "Floor " +
          (currentFloor + 1) +
          " · " +
          dirStr +
          " · In car: " +
          inCar.length +
          " · Waiting (building): " +
          w;
      }

      function needsServiceAtCurrent() {
        const hasUnload = inCar.some((p) => p.dest === currentFloor);
        const list = waiting[currentFloor];
        const canBoard = list.some((p) => {
          const wantsUp = p.dest > currentFloor;
          const wantsDown = p.dest < currentFloor;
          return (
            (direction === 1 && wantsUp) || (direction === -1 && wantsDown)
          );
        });
        return hasUnload || canBoard;
      }

      function unloadAndLoad() {
        inCar = inCar.filter((p) => p.dest !== currentFloor);

        const stay = [];
        const board = [];
        waiting[currentFloor].forEach((p) => {
          const wantsUp = p.dest > currentFloor;
          const wantsDown = p.dest < currentFloor;
          const match =
            (direction === 1 && wantsUp) || (direction === -1 && wantsDown);
          if (match) board.push(p);
          else stay.push(p);
        });
        waiting[currentFloor] = stay;
        inCar = inCar.concat(board);
      }

      function stepDirectionAfterStop() {
        const stops = collectStops();
        if (stops.size === 0) return;

        let above = false;
        let below = false;
        stops.forEach((f) => {
          if (f > currentFloor) above = true;
          if (f < currentFloor) below = true;
        });

        if (direction === 1) {
          if (!above && below) direction = -1;
        } else {
          if (!below && above) direction = 1;
        }
      }

      function runStep() {
        if (needsServiceAtCurrent()) {
          unloadAndLoad();
          stepDirectionAfterStop();
          render();
          setTimeout(runStep, DOOR_MS);
          return;
        }

        let next = nextStopInDirection();
        if (next === null) {
          const stops = collectStops();
          if (stops.size > 0) {
            direction = /** @type {1|-1} */ (-direction);
            render();
            setTimeout(runStep, 280);
            return;
          }
          render();
          setTimeout(runStep, MOVE_MS);
          return;
        }

        if (next > currentFloor) direction = 1;
        else direction = -1;
        currentFloor = next;

        render();

        setTimeout(() => {
          unloadAndLoad();
          stepDirectionAfterStop();
          render();
          setTimeout(runStep, DOOR_MS);
        }, MOVE_MS);
      }

      render();
      scheduleArrival();
      setTimeout(runStep, 500);
    })();
  </script>
</body>
</html>
