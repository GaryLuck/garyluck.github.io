<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Sentence Train</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 { color: #006064; font-size: 2.5em; margin-bottom: 5px; }

        #subtitle { color: #00838f; font-size: 1.2em; margin-top: 0; }

        #progress {
            color: #00838f;
            font-size: 1em;
            margin: 5px 0 10px;
        }

        #game-area {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #train-track {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 6px solid #5d4037;
            margin-bottom: 40px;
            min-height: 120px;
            flex-wrap: wrap;
        }

        .locomotive {
            font-size: 80px;
            line-height: 1;
            margin-bottom: -15px;
        }

        .boxcar {
            width: 100px;
            height: 80px;
            background-color: #ffcc80;
            border: 4px solid #ef6c00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .boxcar::after, .boxcar::before {
            content: '';
            position: absolute;
            bottom: -15px;
            width: 20px;
            height: 20px;
            background-color: #424242;
            border-radius: 50%;
            border: 3px solid #9e9e9e;
        }
        .boxcar::before { left: 10px; }
        .boxcar::after { right: 10px; }

        .boxcar:active { transform: scale(0.95); }
        .boxcar.empty { background-color: #ffe0b2; border-style: dashed; }

        .boxcar.wrong {
            background-color: #ffcdd2;
            border-color: #e53935;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #word-bank {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            min-height: 60px;
        }

        .word-block {
            background-color: #4fc3f7;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #0288d1;
            transition: all 0.1s;
        }

        .word-block:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0288d1;
        }

        #reward-area {
            font-size: 60px;
            height: 80px;
            margin: 20px 0;
        }

        #reward-area.bouncing {
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        #next-btn, #reset-btn {
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            font-family: inherit;
        }

        #next-btn {
            background-color: #66bb6a;
            box-shadow: 0 5px 0 #388e3c;
        }
        #next-btn:active { transform: translateY(5px); box-shadow: none; }

        #reset-btn {
            background-color: #ffa726;
            box-shadow: 0 5px 0 #ef6c00;
        }
        #reset-btn:active { transform: translateY(5px); box-shadow: none; }

        #completion-message {
            display: none;
            font-size: 1.8em;
            color: #006064;
            margin: 20px 0;
            line-height: 1.4;
        }

    </style>
</head>
<body>

    <h1>Silly Sentence Train</h1>
    <p id="subtitle">Click the words to build the sentence!</p>
    <p id="progress"></p>

    <div id="game-area">
        <div id="train-track">
            <div class="locomotive">🚂</div>
        </div>

        <div id="reward-area"></div>
        <div id="word-bank"></div>
        <div class="btn-row">
            <button id="reset-btn" onclick="resetLevel()">Try Again 🔄</button>
            <button id="next-btn" onclick="nextLevel()">Next Train! ➔</button>
        </div>
        <div id="completion-message"></div>
    </div>

    <script>
        const levels = [
            { words: ["The", "dog", "can", "dig"], reward: "🐶 🦴" },
            { words: ["I", "see", "a", "bug"], reward: "👀 🐛" },
            { words: ["A", "cat", "is", "mad"], reward: "😾 💢" },
            { words: ["The", "pig", "is", "big"], reward: "🐷 🐖" },
            { words: ["He", "has", "a", "hat"], reward: "👦 🎩" },
            { words: ["The", "hen", "is", "red"], reward: "🐔 🟥" },
            { words: ["A", "fox", "can", "run"], reward: "🦊 💨" },
            { words: ["She", "got", "a", "cup"], reward: "👧 🥤" },
            { words: ["The", "sun", "is", "hot"], reward: "☀️ 🔥" },
            { words: ["My", "dad", "is", "fun"], reward: "👨 🎉" },
            { words: ["I", "like", "my", "bed"], reward: "😊 🛏️" },
            { words: ["The", "frog", "can", "hop"], reward: "🐸 🦗" },
            { words: ["A", "fish", "can", "swim"], reward: "🐟 🌊" },
            { words: ["We", "sat", "on", "a", "log"], reward: "🪵 🌲" },
            { words: ["My", "mom", "got", "a", "van"], reward: "👩 🚐" },
            { words: ["The", "rat", "ran", "so", "fast"], reward: "🐀 💨" },
            { words: ["I", "had", "a", "nap"], reward: "😴 💤" },
            { words: ["He", "fed", "the", "duck"], reward: "🧑 🦆" },
            { words: ["She", "bit", "a", "fig"], reward: "👧 🍇" },
            { words: ["The", "bat", "is", "up"], reward: "🦇 🌙" },
            { words: ["A", "ram", "can", "jump"], reward: "🐏 ⬆️" },
            { words: ["My", "dog", "dug", "a", "pit"], reward: "🐕 🕳️" },
            { words: ["The", "bug", "hid", "in", "mud"], reward: "🐛 🟤" },
            { words: ["I", "pet", "the", "cat"], reward: "🤚 🐱" },
            { words: ["The", "jam", "is", "good"], reward: "🫙 😋" },
            { words: ["A", "cub", "sat", "in", "a", "den"], reward: "🐻 🏠" },
            { words: ["We", "see", "ten", "red", "hens"], reward: "👀 🐔" },
            { words: ["The", "wet", "pup", "ran", "home"], reward: "🐶 🏡" },
            { words: ["I", "got", "six", "big", "eggs"], reward: "🧑 🥚" },
            { words: ["My", "pal", "and", "I", "can", "hop"], reward: "👫 🐸" },
        ];

        let currentLevel = 0;
        let targetSentence = [];
        let trainSlots = [];
        let isWon = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'ding') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'toot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                osc.frequency.setValueAtTime(450, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function speakWord(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            do {
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
            } while (shuffled.join(' ') === array.join(' '));
            return shuffled;
        }

        function updateProgress() {
            document.getElementById('progress').innerText =
                'Sentence ' + (currentLevel + 1) + ' of ' + levels.length;
        }

        function loadLevel() {
            targetSentence = levels[currentLevel].words;
            trainSlots = new Array(targetSentence.length).fill(null);
            isWon = false;

            document.getElementById('reward-area').innerText = "";
            document.getElementById('reward-area').classList.remove('bouncing');
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('completion-message').style.display = 'none';

            updateProgress();
            renderTrain();

            let shuffledWords = shuffleArray([...targetSentence]);
            renderWordBank(shuffledWords);
        }

        function renderTrain() {
            const track = document.getElementById('train-track');
            track.innerHTML = '<div class="locomotive" onclick="playSound(\'toot\')">🚂</div>';

            for (let i = 0; i < trainSlots.length; i++) {
                const car = document.createElement('div');
                car.className = 'boxcar' + (trainSlots[i] ? '' : ' empty');
                car.innerText = trainSlots[i] || '';

                if (trainSlots[i] && !isWon) {
                    car.onclick = () => removeWordFromTrain(i, trainSlots[i]);
                }
                track.appendChild(car);
            }
        }

        function renderWordBank(words) {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            words.forEach(word => {
                if (word !== null) {
                    const block = document.createElement('div');
                    block.className = 'word-block';
                    block.innerText = word;
                    block.onclick = () => addWordToTrain(word);
                    bank.appendChild(block);
                }
            });
        }

        function addWordToTrain(word) {
            if (isWon) return;
            const emptyIndex = trainSlots.indexOf(null);
            if (emptyIndex !== -1) {
                playSound('pop');
                speakWord(word);
                trainSlots[emptyIndex] = word;

                const currentBankWords = Array.from(document.getElementById('word-bank').children).map(el => el.innerText);
                const wordIndex = currentBankWords.indexOf(word);
                currentBankWords.splice(wordIndex, 1);

                renderTrain();
                renderWordBank(currentBankWords);
                checkWin();
            }
        }

        function removeWordFromTrain(index, word) {
            if (isWon) return;
            playSound('pop');
            trainSlots[index] = null;

            const currentBankWords = Array.from(document.getElementById('word-bank').children).map(el => el.innerText);
            currentBankWords.push(word);

            renderTrain();
            renderWordBank(currentBankWords);
        }

        function checkWin() {
            if (!trainSlots.includes(null)) {
                if (trainSlots.join(' ') === targetSentence.join(' ')) {
                    isWon = true;
                    setTimeout(() => {
                        playSound('ding');
                        setTimeout(() => playSound('toot'), 400);
                        speakWord(targetSentence.join(' '));
                        document.getElementById('reward-area').innerText = levels[currentLevel].reward;
                        document.getElementById('reward-area').classList.add('bouncing');
                        document.getElementById('word-bank').innerHTML = '';

                        if (currentLevel >= levels.length - 1) {
                            document.getElementById('completion-message').style.display = 'block';
                            document.getElementById('completion-message').innerText =
                                'You finished all the trains! Great job! 🎊';
                            document.getElementById('next-btn').style.display = 'inline-block';
                            document.getElementById('next-btn').innerText = 'Play Again! ➔';
                        } else {
                            document.getElementById('next-btn').style.display = 'inline-block';
                            document.getElementById('next-btn').innerText = 'Next Train! ➔';
                        }
                    }, 300);
                } else {
                    playSound('wrong');
                    speakWord("Uh oh! Try again!");

                    const boxes = document.querySelectorAll('.boxcar');
                    boxes.forEach(b => b.classList.add('wrong'));
                    setTimeout(() => {
                        boxes.forEach(b => b.classList.remove('wrong'));
                    }, 500);

                    document.getElementById('reset-btn').style.display = 'inline-block';
                }
            }
        }

        function resetLevel() {
            loadLevel();
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel >= levels.length) {
                currentLevel = 0;
            }
            loadLevel();
        }

        loadLevel();

    </script>
</body>
</html>
