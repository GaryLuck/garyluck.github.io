<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-Tile Puzzle</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tile {
            transition: transform 0.15s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center font-sans p-4">
    <div class="max-w-md w-full p-6 sm:p-8 bg-white rounded-3xl shadow-2xl">
        <h1 class="text-4xl font-extrabold text-center text-slate-800 mb-8 tracking-tight">15 Puzzle</h1>
        
        <div class="flex justify-between items-center mb-8 px-1">
            <div class="flex gap-6">
                <div class="text-slate-600 flex flex-col">
                    <span class="text-xs uppercase font-bold tracking-wider text-slate-400">Moves</span> 
                    <span id="movesDisplay" class="text-2xl font-bold text-slate-700 leading-none">0</span>
                </div>
                <div class="text-slate-600 flex flex-col">
                    <span class="text-xs uppercase font-bold tracking-wider text-slate-400">Time</span> 
                    <span id="timeDisplay" class="text-2xl font-bold text-slate-700 leading-none">0:00</span>
                </div>
            </div>
            <button id="shuffleBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-5 rounded-xl shadow-md transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer">
                Shuffle
            </button>
        </div>

        <div class="w-full aspect-square mx-auto mb-6">
            <div class="bg-slate-800 p-2 sm:p-3 rounded-2xl shadow-inner w-full h-full">
                <div id="grid" class="relative w-full h-full">
                    <!-- Tiles will be injected here -->
                </div>
            </div>
        </div>

        <div id="winMessage" class="hidden mt-4 p-4 bg-emerald-100 text-emerald-800 rounded-xl text-center font-bold text-lg border border-emerald-200 shadow-sm transition-all duration-300">
            🎉 Puzzle Solved! 🎉
        </div>
        
        <div class="mt-8 text-center text-slate-400 text-sm">
            <p>Click tiles or use arrow keys to play.</p>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const movesDisplay = document.getElementById('movesDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const winMessage = document.getElementById('winMessage');

        let tiles = []; 
        let emptyPos = 15; 
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let isPlaying = false;

        function init() {
            createTiles();
            shuffle();
            shuffleBtn.addEventListener('click', shuffle);

            window.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    
                    let targetPos = -1;
                    const row = Math.floor(emptyPos / 4);
                    const col = emptyPos % 4;
                    
                    if (e.key === 'ArrowUp' && row < 3) {
                        targetPos = emptyPos + 4;
                    } else if (e.key === 'ArrowDown' && row > 0) {
                        targetPos = emptyPos - 4;
                    } else if (e.key === 'ArrowLeft' && col < 3) {
                        targetPos = emptyPos + 1;
                    } else if (e.key === 'ArrowRight' && col > 0) {
                        targetPos = emptyPos - 1;
                    }
                    
                    if (targetPos !== -1) {
                        const tile = tiles.find(t => t.currentPos === targetPos);
                        if (tile) handleTileClick(tile.id);
                    }
                }
            });
        }

        function createTiles() {
            grid.innerHTML = '';
            tiles = [];
            
            for (let i = 1; i <= 15; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile absolute w-[25%] h-[25%] z-10 top-0 left-0';
                
                const inner = document.createElement('div');
                inner.className = 'absolute inset-1 bg-gradient-to-b from-indigo-400 to-indigo-600 hover:from-indigo-500 hover:to-indigo-700 rounded-lg sm:rounded-xl text-2xl sm:text-3xl font-extrabold flex items-center justify-center shadow-lg cursor-pointer text-white border-t border-indigo-300 border-b border-b-indigo-800 transition-colors select-none';
                inner.textContent = i;
                
                tile.appendChild(inner);
                tile.addEventListener('click', () => handleTileClick(i));
                grid.appendChild(tile);
                
                tiles.push({
                    id: i,
                    element: tile,
                    currentPos: i - 1 
                });
            }
            emptyPos = 15;
        }

        function render() {
            tiles.forEach(tile => {
                const col = tile.currentPos % 4;
                const row = Math.floor(tile.currentPos / 4);
                tile.element.style.transform = `translate(${col * 100}%, ${row * 100}%)`;
            });
        }

        function shuffle() {
            winMessage.classList.add('hidden');
            stopTimer();
            moves = 0;
            timer = 0;
            updateStats();
            isPlaying = false;
            
            do {
                // reset to solved state
                tiles.forEach(t => t.currentPos = t.id - 1);
                emptyPos = 15;
                
                // simulate random valid moves to ensure solvability
                let prevEmpty = -1;
                for (let i = 0; i < 300; i++) {
                    const validMoves = getValidMoves(emptyPos);
                    const filteredMoves = validMoves.filter(m => m !== prevEmpty);
                    const move = filteredMoves.length > 0 
                        ? filteredMoves[Math.floor(Math.random() * filteredMoves.length)] 
                        : validMoves[0];
                        
                    const tile = tiles.find(t => t.currentPos === move);
                    if (tile) {
                        tile.currentPos = emptyPos;
                        prevEmpty = emptyPos;
                        emptyPos = move;
                    }
                }
            } while (tiles.every(t => t.currentPos === t.id - 1)); // ensure it's not immediately solved
            
            render();
        }

        function getValidMoves(pos) {
            const moves = [];
            const row = Math.floor(pos / 4);
            const col = pos % 4;
            
            if (row > 0) moves.push(pos - 4); // Up
            if (row < 3) moves.push(pos + 4); // Down
            if (col > 0) moves.push(pos - 1); // Left
            if (col < 3) moves.push(pos + 1); // Right
            
            return moves;
        }

        function handleTileClick(id) {
            if (!winMessage.classList.contains('hidden')) return;
            
            const tile = tiles.find(t => t.id === id);
            if (!tile) return;
            
            const validMoves = getValidMoves(emptyPos);
            
            if (validMoves.includes(tile.currentPos)) {
                if (!isPlaying) {
                    isPlaying = true;
                    startTimer();
                }
                
                const temp = emptyPos;
                emptyPos = tile.currentPos;
                tile.currentPos = temp;
                
                moves++;
                updateStats();
                render();
                checkWin();
            }
        }

        function checkWin() {
            const isWin = tiles.every(t => t.currentPos === t.id - 1);
            if (isWin && isPlaying) {
                isPlaying = false;
                stopTimer();
                winMessage.classList.remove('hidden');
            }
        }

        function startTimer() {
            stopTimer();
            timerInterval = setInterval(() => {
                timer++;
                updateStats();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateStats() {
            movesDisplay.textContent = moves;
            const mins = Math.floor(timer / 60);
            const secs = timer % 60;
            timeDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Boot
        init();
    </script>
</body>
</html>
