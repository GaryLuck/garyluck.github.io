<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Word Factory</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 { color: #f1c40f; font-size: 2.8em; margin-bottom: 5px; text-shadow: 2px 2px 0 #d35400; }
        p { color: #ecf0f1; font-size: 1.2em; margin-top: 0; }

        /* The Machine UI */
        #machine {
            background: #7f8c8d;
            border: 8px solid #34495e;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 20px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        /* The Letter Slots */
        #slots-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .slot {
            background: #ecf0f1;
            border: 6px solid #bdc3c7;
            border-radius: 10px;
            width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
        }

        .arrow-btn {
            background: #e74c3c;
            color: white;
            border: none;
            width: 100%;
            padding: 15px 0;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.1s;
        }
        
        .arrow-btn:active { background: #c0392b; }
        .arrow-btn.up { border-radius: 5px 5px 0 0; border-bottom: 3px solid #c0392b; }
        .arrow-btn.down { border-radius: 0 0 5px 5px; border-top: 3px solid #c0392b; }

        .letter-display {
            font-size: 60px;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
            text-transform: lowercase;
        }

        /* The Vowel slot stands out */
        .slot.vowel { border-color: #f39c12; }
        .slot.vowel .letter-display { color: #d35400; }

        /* Big Go Button */
        #go-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-bottom: 8px solid #27ae60;
            padding: 20px 50px;
            font-size: 36px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.1s;
            font-family: inherit;
        }

        #go-btn:active {
            transform: translateY(8px);
            border-bottom-width: 0px;
            margin-bottom: 8px;
        }

        /* Output Area */
        #output-screen {
            background: #000;
            border: 6px solid #95a5a6;
            border-radius: 15px;
            height: 150px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            overflow: hidden;
            position: relative;
        }

        .scanline {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        @keyframes popup {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .show-emoji { animation: popup 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    </style>
</head>
<body>

    <h1>The Word Factory</h1>
    <p>Build a word and pull the big green lever!</p>

    <div id="machine">
        <div id="slots-container">
            <div class="slot">
                <button class="arrow-btn up" onclick="changeLetter(0, 1)">▲</button>
                <div class="letter-display" id="letter-0">b</div>
                <button class="arrow-btn down" onclick="changeLetter(0, -1)">▼</button>
            </div>
            <div class="slot vowel">
                <button class="arrow-btn up" onclick="changeLetter(1, 1)">▲</button>
                <div class="letter-display" id="letter-1">a</div>
                <button class="arrow-btn down" onclick="changeLetter(1, -1)">▼</button>
            </div>
            <div class="slot">
                <button class="arrow-btn up" onclick="changeLetter(2, 1)">▲</button>
                <div class="letter-display" id="letter-2">t</div>
                <button class="arrow-btn down" onclick="changeLetter(2, -1)">▼</button>
            </div>
        </div>

        <button id="go-btn" onclick="checkWord()">GO!</button>

        <div id="output-screen">
            <div class="scanline"></div>
            <div id="emoji-display"></div>
        </div>
    </div>

    <script>
        // --- DATA DICTIONARY ---
        // A simple key-value store mapping valid CVC words to their emoji rewards.
        const dictionary = {
            "bat": "🦇", "cat": "🐱", "hat": "🧢", "mat": "🔲", "rat": "🐀",
            "bed": "🛏️", "red": "🟥", "web": "🕸️", "pen": "🖊️", "hen": "🐔",
            "pig": "🐷", "wig": "👱‍♀️", "dig": "⛏️", "zip": "🤐", "lip": "👄",
            "dog": "🐶", "log": "🪵", "fox": "🦊", "box": "📦", "mop": "🧹",
            "bug": "🐛", "mug": "☕", "rug": "🧶", "sun": "☀️", "bus": "🚌"
        };

        // Standard English alphabet arrays divided by vowels and consonants
        const consonants = ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','y','z'];
        const vowels = ['a','e','i','o','u'];

        // State array: tracks the current index of the selected letter for [Slot1, Slot2, Slot3]
        let indices = [0, 0, 14]; // Starts on b-a-t (consonant[0], vowel[0], consonant[14])

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'gear') { // Mechanical click for arrows
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'success') { // Ding!
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
                osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.4); // A6
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'fail') { // Clunk / Error
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.8; // Slow down for early readers
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        // --- CORE LOGIC ---
        function updateDisplay() {
            document.getElementById('letter-0').innerText = consonants[indices[0]];
            document.getElementById('letter-1').innerText = vowels[indices[1]];
            document.getElementById('letter-2').innerText = consonants[indices[2]];
        }

        function changeLetter(slotIndex, direction) {
            playSound('gear');
            
            // Clear the screen when they start building a new word
            document.getElementById('emoji-display').innerText = '';
            document.getElementById('emoji-display').classList.remove('show-emoji');

            const arrayToUse = (slotIndex === 1) ? vowels : consonants;
            
            // Adjust index with wrap-around logic
            indices[slotIndex] += direction;
            
            if (indices[slotIndex] >= arrayToUse.length) {
                indices[slotIndex] = 0;
            } else if (indices[slotIndex] < 0) {
                indices[slotIndex] = arrayToUse.length - 1;
            }
            
            updateDisplay();
        }

        function checkWord() {
            const word = consonants[indices[0]] + vowels[indices[1]] + consonants[indices[2]];
            const emojiDisplay = document.getElementById('emoji-display');
            
            // Remove animation class to allow re-triggering
            emojiDisplay.classList.remove('show-emoji');
            
            // Force a reflow so the browser registers the class removal before adding it back
            void emojiDisplay.offsetWidth; 

            if (dictionary[word]) {
                // It's a real word!
                playSound('success');
                speakText(word);
                emojiDisplay.innerText = dictionary[word];
                emojiDisplay.classList.add('show-emoji');
            } else {
                // It's a silly/nonsense word!
                playSound('fail');
                speakText(word); // It reads the silly word anyway to practice phonics!
                emojiDisplay.innerText = '❓';
                emojiDisplay.classList.add('show-emoji');
            }
        }

        // Initialize the first word display on load
        updateDisplay();

    </script>
</body>
</html>
