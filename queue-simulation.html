<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Simulation Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            padding: 20px;
        }

        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .control-group input[type="number"],
        .control-group input[type="range"] {
            width: 100%;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .control-group input[type="range"] {
            padding: 0;
        }

        .range-value {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
            color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: #10b981;
            color: white;
        }

        .btn-start:hover {
            background: #059669;
        }

        .btn-stop {
            background: #ef4444;
            color: white;
        }

        .btn-stop:hover {
            background: #dc2626;
        }

        .btn-reset {
            background: #6b7280;
            color: white;
        }

        .btn-reset:hover {
            background: #4b5563;
        }

        .visualization {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .animation-container {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
        }

        .animation-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .queue-visual {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .queue-line {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            min-height: 40px;
            flex: 1;
        }

        .customer {
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            animation: customerEnter 0.3s ease-out;
        }

        @keyframes customerEnter {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .servers {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .server {
            width: 80px;
            height: 80px;
            border: 3px solid #667eea;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            transition: all 0.3s;
        }

        .server.busy {
            background: #10b981;
            border-color: #10b981;
        }

        .server-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
        }

        .server.busy .server-label {
            color: white;
        }

        .server-icon {
            font-size: 24px;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .chart-box {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
        }

        .chart-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }

            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Queue Simulation Dashboard</h1>
            <p>Interactive Discrete Event Simulation</p>
        </div>

        <div class="content">
            <div class="controls">
                <h2 style="margin-bottom: 20px; color: #333;">Parameters</h2>
                
                <div class="control-group">
                    <label>Arrival Rate (customers/min): <span class="range-value" id="arrivalValue">5</span></label>
                    <input type="range" id="arrivalRate" min="1" max="20" value="5" step="0.5">
                </div>

                <div class="control-group">
                    <label>Service Time (seconds): <span class="range-value" id="serviceValue">10</span></label>
                    <input type="range" id="serviceTime" min="5" max="60" value="10" step="1">
                </div>

                <div class="control-group">
                    <label>Service Variability: <span class="range-value" id="variabilityValue">0.3</span></label>
                    <input type="range" id="variability" min="0" max="1" value="0.3" step="0.1">
                </div>

                <div class="control-group">
                    <label>Number of Servers: <span class="range-value" id="serversValue">2</span></label>
                    <input type="range" id="numServers" min="1" max="6" value="2" step="1">
                </div>

                <div class="control-group">
                    <label>Simulation Speed: <span class="range-value" id="speedValue">1x</span></label>
                    <input type="range" id="simSpeed" min="0.5" max="5" value="1" step="0.5">
                </div>

                <div class="button-group">
                    <button class="btn-start" id="startBtn">Start</button>
                    <button class="btn-stop" id="stopBtn">Stop</button>
                </div>
                <button class="btn-reset" id="resetBtn" style="width: 100%; margin-top: 10px;">Reset</button>
            </div>

            <div class="visualization">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Queue Length</h3>
                        <div class="value" id="queueLength">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Avg Wait Time</h3>
                        <div class="value" id="avgWait">0s</div>
                    </div>
                    <div class="stat-card">
                        <h3>Utilization</h3>
                        <div class="value" id="utilization">0%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Throughput</h3>
                        <div class="value" id="throughput">0/min</div>
                    </div>
                </div>

                <div class="animation-container">
                    <div class="animation-title">Live Queue Visualization</div>
                    <div class="queue-visual">
                        <div style="font-weight: 600; color: #666;">Queue:</div>
                        <div class="queue-line" id="queueLine"></div>
                    </div>
                    <div class="queue-visual">
                        <div style="font-weight: 600; color: #666;">Servers:</div>
                        <div class="servers" id="servers"></div>
                    </div>
                </div>

                <div class="charts-container">
                    <div class="chart-box">
                        <div class="chart-title">Queue Length Over Time</div>
                        <canvas id="queueChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">Wait Time Distribution</div>
                        <canvas id="waitChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">Server Utilization</div>
                        <canvas id="utilizationChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">Throughput Over Time</div>
                        <canvas id="throughputChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulation state
        let simulation = {
            running: false,
            time: 0,
            queue: [],
            servers: [],
            nextCustomerId: 1,
            nextArrival: 0,
            events: [],
            stats: {
                totalWaitTime: 0,
                totalCustomers: 0,
                completedCustomers: 0,
                queueLengthHistory: [],
                waitTimes: [],
                throughputHistory: [],
                utilizationHistory: []
            }
        };

        let charts = {};
        let animationFrame;

        // Parameters
        const params = {
            arrivalRate: 5,
            serviceTime: 10,
            variability: 0.3,
            numServers: 2,
            simSpeed: 1
        };

        // Initialize
        function init() {
            setupControls();
            setupCharts();
            updateServerDisplay();
            updateStats();
        }

        function setupControls() {
            document.getElementById('arrivalRate').addEventListener('input', (e) => {
                params.arrivalRate = parseFloat(e.target.value);
                document.getElementById('arrivalValue').textContent = params.arrivalRate;
            });

            document.getElementById('serviceTime').addEventListener('input', (e) => {
                params.serviceTime = parseFloat(e.target.value);
                document.getElementById('serviceValue').textContent = params.serviceTime;
            });

            document.getElementById('variability').addEventListener('input', (e) => {
                params.variability = parseFloat(e.target.value);
                document.getElementById('variabilityValue').textContent = params.variability;
            });

            document.getElementById('numServers').addEventListener('input', (e) => {
                params.numServers = parseInt(e.target.value);
                document.getElementById('serversValue').textContent = params.numServers;
                if (!simulation.running) {
                    resetSimulation();
                }
            });

            document.getElementById('simSpeed').addEventListener('input', (e) => {
                params.simSpeed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = params.simSpeed + 'x';
            });

            document.getElementById('startBtn').addEventListener('click', startSimulation);
            document.getElementById('stopBtn').addEventListener('click', stopSimulation);
            document.getElementById('resetBtn').addEventListener('click', resetSimulation);
        }

        function setupCharts() {
            const chartConfig = (label, color) => ({
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '33',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { display: true, title: { display: true, text: 'Time (s)' } },
                        y: { beginAtZero: true }
                    }
                }
            });

            charts.queue = new Chart(document.getElementById('queueChart'), chartConfig('Queue Length', '#667eea'));
            charts.utilization = new Chart(document.getElementById('utilizationChart'), chartConfig('Utilization %', '#10b981'));
            charts.throughput = new Chart(document.getElementById('throughputChart'), chartConfig('Customers/min', '#f59e0b'));
            
            charts.wait = new Chart(document.getElementById('waitChart'), {
                type: 'bar',
                data: {
                    labels: ['0-5s', '5-10s', '10-20s', '20-30s', '30-60s', '60s+'],
                    datasets: [{
                        label: 'Customers',
                        data: [0, 0, 0, 0, 0, 0],
                        backgroundColor: '#8b5cf6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Count' } }
                    }
                }
            });
        }

        function startSimulation() {
            if (!simulation.running) {
                simulation.running = true;
                scheduleNextArrival();
                animate();
            }
        }

        function stopSimulation() {
            simulation.running = false;
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        }

        function resetSimulation() {
            stopSimulation();
            simulation = {
                running: false,
                time: 0,
                queue: [],
                servers: Array(params.numServers).fill(null),
                nextCustomerId: 1,
                nextArrival: 0,
                events: [],
                stats: {
                    totalWaitTime: 0,
                    totalCustomers: 0,
                    completedCustomers: 0,
                    queueLengthHistory: [],
                    waitTimes: [],
                    throughputHistory: [],
                    utilizationHistory: []
                }
            };

            // Reset charts
            Object.values(charts).forEach(chart => {
                chart.data.labels = [];
                chart.data.datasets[0].data = [];
                chart.update();
            });
            charts.wait.data.datasets[0].data = [0, 0, 0, 0, 0, 0];
            charts.wait.update();

            updateServerDisplay();
            updateQueueDisplay();
            updateStats();
        }

        function exponentialRandom(rate) {
            return -Math.log(1 - Math.random()) / rate;
        }

        function normalRandom(mean, stdDev) {
            let u1 = Math.random();
            let u2 = Math.random();
            let z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
            return mean + z * stdDev;
        }

        function scheduleNextArrival() {
            const interarrivalTime = exponentialRandom(params.arrivalRate / 60) * 1000;
            simulation.nextArrival = simulation.time + interarrivalTime;
        }

        function processArrival() {
            const customer = {
                id: simulation.nextCustomerId++,
                arrivalTime: simulation.time
            };

            simulation.queue.push(customer);
            simulation.stats.totalCustomers++;
            
            scheduleNextArrival();
            processQueue();
            updateQueueDisplay();
        }

        function processQueue() {
            for (let i = 0; i < simulation.servers.length; i++) {
                if (simulation.servers[i] === null && simulation.queue.length > 0) {
                    const customer = simulation.queue.shift();
                    const waitTime = simulation.time - customer.arrivalTime;
                    simulation.stats.totalWaitTime += waitTime;
                    simulation.stats.waitTimes.push(waitTime / 1000);

                    const serviceTime = Math.max(1, normalRandom(
                        params.serviceTime * 1000,
                        params.serviceTime * 1000 * params.variability
                    ));

                    simulation.servers[i] = {
                        customer: customer,
                        endTime: simulation.time + serviceTime
                    };
                }
            }
            updateServerDisplay();
        }

        function processService() {
            for (let i = 0; i < simulation.servers.length; i++) {
                if (simulation.servers[i] && simulation.time >= simulation.servers[i].endTime) {
                    simulation.servers[i] = null;
                    simulation.stats.completedCustomers++;
                }
            }
            processQueue();
        }

        function updateStats() {
            document.getElementById('queueLength').textContent = simulation.queue.length;
            
            const avgWait = simulation.stats.totalCustomers > 0 
                ? (simulation.stats.totalWaitTime / simulation.stats.totalCustomers / 1000).toFixed(1)
                : 0;
            document.getElementById('avgWait').textContent = avgWait + 's';

            const busyServers = simulation.servers.filter(s => s !== null).length;
            const utilization = ((busyServers / simulation.servers.length) * 100).toFixed(0);
            document.getElementById('utilization').textContent = utilization + '%';

            const throughput = simulation.time > 0
                ? (simulation.stats.completedCustomers / (simulation.time / 60000)).toFixed(1)
                : 0;
            document.getElementById('throughput').textContent = throughput + '/min';
        }

        function updateCharts() {
            const timeInSeconds = Math.floor(simulation.time / 1000);

            // Queue length chart
            if (charts.queue.data.labels.length === 0 || 
                charts.queue.data.labels[charts.queue.data.labels.length - 1] !== timeInSeconds) {
                charts.queue.data.labels.push(timeInSeconds);
                charts.queue.data.datasets[0].data.push(simulation.queue.length);
                if (charts.queue.data.labels.length > 60) {
                    charts.queue.data.labels.shift();
                    charts.queue.data.datasets[0].data.shift();
                }
                charts.queue.update('none');
            }

            // Utilization chart
            if (charts.utilization.data.labels.length === 0 || 
                charts.utilization.data.labels[charts.utilization.data.labels.length - 1] !== timeInSeconds) {
                const busyServers = simulation.servers.filter(s => s !== null).length;
                const util = (busyServers / simulation.servers.length) * 100;
                charts.utilization.data.labels.push(timeInSeconds);
                charts.utilization.data.datasets[0].data.push(util);
                if (charts.utilization.data.labels.length > 60) {
                    charts.utilization.data.labels.shift();
                    charts.utilization.data.datasets[0].data.shift();
                }
                charts.utilization.update('none');
            }

            // Throughput chart
            if (charts.throughput.data.labels.length === 0 || 
                charts.throughput.data.labels[charts.throughput.data.labels.length - 1] !== timeInSeconds) {
                const throughput = simulation.time > 0
                    ? simulation.stats.completedCustomers / (simulation.time / 60000)
                    : 0;
                charts.throughput.data.labels.push(timeInSeconds);
                charts.throughput.data.datasets[0].data.push(throughput);
                if (charts.throughput.data.labels.length > 60) {
                    charts.throughput.data.labels.shift();
                    charts.throughput.data.datasets[0].data.shift();
                }
                charts.throughput.update('none');
            }

            // Wait time histogram
            const bins = [0, 0, 0, 0, 0, 0];
            simulation.stats.waitTimes.forEach(wt => {
                if (wt < 5) bins[0]++;
                else if (wt < 10) bins[1]++;
                else if (wt < 20) bins[2]++;
                else if (wt < 30) bins[3]++;
                else if (wt < 60) bins[4]++;
                else bins[5]++;
            });
            charts.wait.data.datasets[0].data = bins;
            charts.wait.update('none');
        }

        function updateQueueDisplay() {
            const queueLine = document.getElementById('queueLine');
            queueLine.innerHTML = '';
            simulation.queue.forEach((customer, idx) => {
                if (idx < 20) {
                    const div = document.createElement('div');
                    div.className = 'customer';
                    div.textContent = customer.id;
                    queueLine.appendChild(div);
                }
            });
            if (simulation.queue.length > 20) {
                const more = document.createElement('div');
                more.style.padding = '5px';
                more.style.color = '#666';
                more.textContent = `+${simulation.queue.length - 20} more`;
                queueLine.appendChild(more);
            }
        }

        function updateServerDisplay() {
            const serversDiv = document.getElementById('servers');
            serversDiv.innerHTML = '';
            simulation.servers.forEach((server, idx) => {
                const div = document.createElement('div');
                div.className = 'server' + (server ? ' busy' : '');
                div.innerHTML = `
                    <div class="server-label">Server ${idx + 1}</div>
                    <div class="server-icon">${server ? '👤' : '⏸️'}</div>
                `;
                serversDiv.appendChild(div);
            });
        }

        let lastUpdate = Date.now();
        function animate() {
            if (!simulation.running) return;

            const now = Date.now();
            const deltaTime = (now - lastUpdate) * params.simSpeed;
            lastUpdate = now;

            simulation.time += deltaTime;

            // Process arrivals
            if (simulation.time >= simulation.nextArrival) {
                processArrival();
            }

            // Process service completions
            processService();

            // Update displays
            updateStats();
            updateCharts();

            animationFrame = requestAnimationFrame(animate);
        }

        // Chart.js minimal implementation
        class Chart {
            constructor(canvas, config) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.config = config;
                this.data = config.data;
                this.options = config.options;
                this.type = config.type;
                
                this.canvas.width = this.canvas.offsetWidth * 2;
                this.canvas.height = this.canvas.offsetHeight * 2;
                this.ctx.scale(2, 2);
                
                this.update();
            }

            update(mode) {
                const ctx = this.ctx;
                const width = this.canvas.width / 2;
                const height = this.canvas.height / 2;
                
                ctx.clearRect(0, 0, width, height);
                
                const padding = 40;
                const chartWidth = width - padding * 2;
                const chartHeight = height - padding * 2;
                
                if (this.data.datasets[0].data.length === 0) return;
                
                const maxValue = Math.max(...this.data.datasets[0].data, 1);
                
                if (this.type === 'line') {
                    ctx.strokeStyle = this.data.datasets[0].borderColor;
                    ctx.fillStyle = this.data.datasets[0].backgroundColor;
                    ctx.lineWidth = 2;
                    
                    ctx.beginPath();
                    this.data.datasets[0].data.forEach((value, i) => {
                        const x = padding + (i / (this.data.datasets[0].data.length - 1)) * chartWidth;
                        const y = padding + chartHeight - (value / maxValue) * chartHeight;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                    
                    ctx.lineTo(padding + chartWidth, padding + chartHeight);
                    ctx.lineTo(padding, padding + chartHeight);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'bar') {
                    const barWidth = chartWidth / this.data.labels.length;
                    ctx.fillStyle = this.data.datasets[0].backgroundColor;
                    
                    this.data.datasets[0].data.forEach((value, i) => {
                        const x = padding + i * barWidth;
                        const barHeight = (value / maxValue) * chartHeight;
                        const y = padding + chartHeight - barHeight;
                        ctx.fillRect(x + 2, y, barWidth - 4, barHeight);
                    });
                }
                
                // Axes
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding, padding);
                ctx.lineTo(padding, padding + chartHeight);
                ctx.lineTo(padding + chartWidth, padding + chartHeight);
                ctx.stroke();
            }
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
