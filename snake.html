<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Arcade Snake — Classic & AI Arena</title>
  <meta name="description" content="A premium classic snake game with interactive speed controls, synthetic retro audio, and autonomous AI battle modes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Variables & Reset ────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #07070e;
      --surface: rgba(20, 20, 35, 0.6);
      --surface-hover: rgba(30, 30, 50, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(0, 242, 254, 0.25);
      --text: #e2e2ec;
      --muted: rgba(226, 226, 236, 0.45);
      
      /* Neon Palette */
      --neon-cyan: #00f2fe;
      --neon-cyan-dark: #0072ff;
      --neon-teal: #00e5cc;
      --neon-teal-dark: #006b58;
      --neon-coral: #ff4b5c;
      --neon-coral-dark: #8c1620;
      --neon-violet: #b92bff;
      --neon-violet-dark: #5b0bb6;
      --neon-gold: #ffb300;
      --neon-gold-dark: #b37d00;
      
      --food-color: #39ff14;
      --food-glow: rgba(57, 255, 20, 0.8);
    }

    body {
      background:
        radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(185, 43, 255, 0.06) 0%, transparent 45%),
        var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 40px;
      overflow-x: hidden;
    }

    /* ─── Typography & Header ─────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 10px rgba(0, 242, 254, 0.15));
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* ─── Mode Selector Tabs ──────────────────────────────────────────────── */
    .mode-selector {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px;
      margin-bottom: 24px;
      width: fit-content;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .mode-tab {
      padding: 10px 24px;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mode-tab:hover {
      color: var(--text);
    }

    .mode-tab.active {
      color: #07070e;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-violet) 100%);
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.35);
    }

    /* ─── Grid Container & Panels ─────────────────────────────────────────── */
    .game-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      width: 100%;
      max-width: 580px;
      align-items: start;
    }

    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 
        0 8px 32px 0 rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: border-color 0.4s ease;
    }

    .glass-card.classic-active {
      border-color: rgba(0, 242, 254, 0.2);
    }

    .glass-card.ai-active {
      border-color: rgba(185, 43, 255, 0.2);
    }

    /* HUD */
    .hud-panel {
      margin-bottom: 16px;
    }

    /* Classic Mode HUD */
    .classic-hud {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px;
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-val {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-val.score {
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-cyan-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-val.highscore {
      background: linear-gradient(135deg, var(--neon-gold) 0%, var(--neon-gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* AI Battle HUD */
    .ai-hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .snake-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.4s, border-color 0.3s;
    }

    .snake-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
    }

    .snake-card.teal   { border-color: rgba(0, 229, 204, 0.15); }
    .snake-card.coral  { border-color: rgba(255, 107, 107, 0.15); }
    .snake-card.violet { border-color: rgba(185, 43, 255, 0.15); }

    .snake-card.teal::before   { background: var(--neon-teal); }
    .snake-card.coral::before  { background: var(--neon-coral); }
    .snake-card.violet::before { background: var(--neon-violet); }

    .snake-card.dead {
      opacity: 0.35;
      border-color: rgba(255, 255, 255, 0.02);
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .card-status {
      font-size: 0.85rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .card-status.alive { color: var(--text); }
    .card-status.dead  { color: var(--neon-coral); }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .mini-stat {
      display: flex;
      flex-direction: column;
    }

    .mini-label {
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
    }

    .mini-val {
      font-size: 1rem;
      font-weight: 700;
    }

    .mini-val.teal   { color: var(--neon-teal); }
    .mini-val.coral  { color: var(--neon-coral); }
    .mini-val.violet { color: var(--neon-violet); }

    /* ─── Canvas Game Arena ──────────────────────────────────────────────── */
    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: #040409;
      box-shadow: 
        inset 0 0 20px rgba(0, 0, 0, 0.8),
        0 10px 40px rgba(0, 0, 0, 0.6);
      width: 100%;
      aspect-ratio: 1 / 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ─── Controls Panel ─────────────────────────────────────────────────── */
    .controls-panel {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .slider-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
    }

    .slider-info {
      display: flex;
      flex-direction: column;
    }

    .slider-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .slider-value {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--neon-cyan);
    }

    .speed-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    .speed-slider::-webkit-slider-runnable-track {
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-violet));
      height: 6px;
      border-radius: 100px;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid var(--bg);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
      margin-top: -6px;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(0, 242, 254, 1);
    }

    /* Buttons row */
    .btn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .arcade-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .arcade-btn:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .arcade-btn:active {
      transform: translateY(1px);
    }

    .arcade-btn.primary {
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-cyan-dark) 100%);
      color: #07070e;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
    }

    .arcade-btn.primary:hover {
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
    }

    .arcade-btn.sound-on {
      border-color: rgba(0, 229, 204, 0.2);
      color: var(--neon-teal);
    }

    /* ─── Virtual D-Pad (Touch Controls) ─────────────────────────────────── */
    .dpad-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      user-select: none;
    }

    .dpad-grid {
      display: grid;
      grid-template-columns: 50px 50px 50px;
      grid-template-rows: 50px 50px 50px;
      gap: 8px;
    }

    .dpad-btn {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 1.25rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .dpad-btn:active {
      background: rgba(0, 242, 254, 0.2);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      transform: scale(0.92);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    .dpad-btn.up    { grid-column: 2; grid-row: 1; }
    .dpad-btn.left  { grid-column: 1; grid-row: 2; }
    .dpad-btn.right { grid-column: 3; grid-row: 2; }
    .dpad-btn.down  { grid-column: 2; grid-row: 3; }
    
    .dpad-center {
      grid-column: 2;
      grid-row: 2;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Instruction details overlay */
    .instruction-bar {
      margin-top: 18px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .instruction-bar kbd {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      color: var(--text);
      font-size: 0.75rem;
    }

    /* Toggle controls row */
    .toggle-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .text-toggle {
      font-size: 0.75rem;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    .text-toggle:hover {
      color: var(--text);
    }

    /* ─── Keyframe Animations ─────────────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Media Queries (Responsive Design) ────────────────────────────────── */
    @media (max-width: 480px) {
      h1 {
        font-size: 2.2rem;
      }
      .glass-card {
        padding: 15px;
      }
      .stat-val {
        font-size: 1.6rem;
      }
      .mode-tab {
        padding: 8px 18px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Neon Snake</h1>
    <p class="subtitle">Classic Arcade & AI Combat Arena</p>
  </header>

  <!-- Mode Toggle Tabs -->
  <div class="mode-selector">
    <button class="mode-tab active" id="tabClassic" onclick="setMode('classic')">🎮 Classic Mode</button>
    <button class="mode-tab" id="tabAI" onclick="setMode('ai')">🤖 AI Arena</button>
  </div>

  <div class="game-container">
    <div class="glass-card classic-active" id="gameCard">
      
      <!-- Dynamic HUD panel depending on selected mode -->
      <div class="hud-panel">
        
        <!-- Classic HUD -->
        <div class="classic-hud" id="classicHUD">
          <div class="stat-box">
            <span class="stat-label">Score</span>
            <span class="stat-val score" id="classicScore">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">High Score</span>
            <span class="stat-val highscore" id="classicHighScore">0</span>
          </div>
        </div>

        <!-- AI HUD -->
        <div class="ai-hud" id="aiHUD" style="display: none;">
          <!-- Teal Snake Card -->
          <div class="snake-card teal" id="card-0">
            <div class="card-title">🐍 Teal AI</div>
            <div class="card-status alive" id="status-0">ALIVE</div>
            <div class="card-grid">
              <div class="mini-stat">
                <span class="mini-label">Score</span>
                <span class="mini-val teal" id="score-0">0</span>
              </div>
              <div class="mini-stat">
                <span class="mini-label">Len</span>
                <span class="mini-val teal" id="length-0">4</span>
              </div>
            </div>
          </div>
          
          <!-- Coral Snake Card -->
          <div class="snake-card coral" id="card-1">
            <div class="card-title">🐍 Coral AI</div>
            <div class="card-status alive" id="status-1">ALIVE</div>
            <div class="card-grid">
              <div class="mini-stat">
                <span class="mini-label">Score</span>
                <span class="mini-val coral" id="score-1">0</span>
              </div>
              <div class="mini-stat">
                <span class="mini-label">Len</span>
                <span class="mini-val coral" id="length-1">4</span>
              </div>
            </div>
          </div>

          <!-- Violet Snake Card -->
          <div class="snake-card violet" id="card-2">
            <div class="card-title">🐍 Violet AI</div>
            <div class="card-status alive" id="status-2">ALIVE</div>
            <div class="card-grid">
              <div class="mini-stat">
                <span class="mini-label">Score</span>
                <span class="mini-val violet" id="score-2">0</span>
              </div>
              <div class="mini-stat">
                <span class="mini-label">Len</span>
                <span class="mini-val violet" id="length-2">4</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Game Canvas Area -->
      <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>

      <!-- Controls Panel -->
      <div class="controls-panel">
        
        <!-- Speed Slider Control -->
        <div class="slider-container">
          <div class="slider-info">
            <span class="slider-label">Speed</span>
            <span class="slider-value" id="speedLabel">5x</span>
          </div>
          <input type="range" min="1" max="10" value="5" class="speed-slider" id="speedSlider" oninput="handleSpeedChange(this.value)">
        </div>

        <!-- Buttons Grid -->
        <div class="btn-row">
          <button class="arcade-btn primary" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
          <button class="arcade-btn" id="restartBtn" onclick="restartGame()">↺ Restart</button>
          <button class="arcade-btn sound-on" id="soundBtn" onclick="toggleSound()">🔊 Audio</button>
        </div>

      </div>

      <!-- Virtual D-Pad for Mobile Devices (toggled via button or auto-detected) -->
      <div class="dpad-container" id="dpadPanel" style="display: none;">
        <div class="dpad-grid">
          <button class="dpad-btn up" onclick="handleDpad('up')">▲</button>
          <button class="dpad-btn left" onclick="handleDpad('left')">◀</button>
          <div class="dpad-center"></div>
          <button class="dpad-btn right" onclick="handleDpad('right')">▶</button>
          <button class="dpad-btn down" onclick="handleDpad('down')">▼</button>
        </div>
      </div>

      <!-- Game Instructions Footer -->
      <div class="instruction-bar" id="instructionBar">
        Use <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>←</kbd><kbd>↑</kbd><kbd>→</kbd><kbd>↓</kbd> to control the snake.<br>
        Press <kbd>Space</kbd> to Pause/Resume. Press <kbd>R</kbd> to Quick-Restart.
      </div>

      <!-- Toggle Virtual Controls manually -->
      <div class="toggle-row">
        <button class="text-toggle" onclick="toggleDpadDisplay()">Toggle On-Screen D-Pad</button>
      </div>

    </div>
  </div>

<script>
// ─── AUDIO ENGINE (Web Audio API Synthesizer) ──────────────────────────────────
const audio = {
  ctx: null,
  enabled: true,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  },
  playEat() {
    if (!this.enabled) return;
    this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(750, this.ctx.currentTime + 0.1);
    
    gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start();
    osc.stop(this.ctx.currentTime + 0.1);
  },
  playDie() {
    if (!this.enabled) return;
    this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(160, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 0.35);
    
    gain.gain.setValueAtTime(0.18, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.35);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start();
    osc.stop(this.ctx.currentTime + 0.35);
  },
  playHighScore() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
    
    notes.forEach((freq, idx) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now + idx * 0.07);
      
      gain.gain.setValueAtTime(0.1, now + idx * 0.07);
      gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.07 + 0.14);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(now + idx * 0.07);
      osc.stop(now + idx * 0.07 + 0.14);
    });
  },
  playClick() {
    if (!this.enabled) return;
    this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(550, this.ctx.currentTime);
    
    gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start();
    osc.stop(this.ctx.currentTime + 0.05);
  }
};

// ─── GAME CONSTANTS & SETTINGS ─────────────────────────────────────────────────
const COLS = 40;
const ROWS = 40;
const CELL = 14;

// Speed intervals in milliseconds (Speed 1 to 10)
const SPEED_INTERVALS = [350, 300, 250, 200, 160, 130, 100, 80, 65, 50];

// AI Specifications
const AI_DEFS = [
  { id: 0, name: 'Teal',   cls: 'teal',   hc: '#00e5cc', bc: '#006b58', sx: 7,  sy: 20, dx: 1,  dy: 0  },
  { id: 1, name: 'Coral',  cls: 'coral',  hc: '#ff4b5c', bc: '#8c1620', sx: 20, sy: 7,  dx: 0,  dy: 1  },
  { id: 2, name: 'Violet', cls: 'violet', hc: '#b92bff', bc: '#5b0bb6', sx: 33, sy: 20, dx: -1, dy: 0  },
];
const DIRS = [
  { x: 1,  y: 0  }, // Right
  { x: -1, y: 0  }, // Left
  { x: 0,  y: 1  }, // Down
  { x: 0,  y: -1 }  // Up
];

// ─── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;
const ctx = canvas.getContext('2d');

// ─── GAME VARIABLES ────────────────────────────────────────────────────────────
let gameMode = 'classic'; // 'classic' | 'ai'
let gameState = 'playing'; // 'playing' | 'paused' | 'gameover'
let currentSpeed = 5;

// Player Snake State (Classic Mode)
let classicSnake = {
  body: [],
  dir: { x: 1, y: 0 },
  nextDir: { x: 1, y: 0 },
  grow: 0,
  score: 0,
  highScore: parseInt(localStorage.getItem('snake_highscore') || '0')
};

// AI Snakes State (AI Battle Mode)
let aiSnakes = [];
let foods = []; // Holds food items [{x, y}, ...]
let maxFoodCount = 1; // 1 in classic, 5 in AI battle
let winner = null;
let highScoreBeaten = false;

// Particle System
let particles = [];

// Gameloop variables
let lastTickTime = 0;
let rafId = null;

// Initialize scores
document.getElementById('classicHighScore').textContent = classicSnake.highScore;

// ─── GENERAL HELPERS ───────────────────────────────────────────────────────────
function ck(x, y) {
  return x * ROWS + y; // Unique 1D cell index
}

function randomGridPos() {
  return {
    x: Math.floor(Math.random() * COLS),
    y: Math.floor(Math.random() * ROWS)
  };
}

// ─── PARTICLE SYSTEM ───────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 15) {
  const px = x * CELL + CELL / 2;
  const py = y * CELL + CELL / 2;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 2 + 1;
    particles.push({
      x: px,
      y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: color,
      life: 1.0,
      decay: Math.random() * 0.03 + 0.02
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98; // friction
    p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2 + p.life * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0; // Reset alpha
}

// ─── SOUND TOGGLE / UI CLICK ───────────────────────────────────────────────────
function toggleSound() {
  audio.enabled = !audio.enabled;
  const btn = document.getElementById('soundBtn');
  if (audio.enabled) {
    btn.classList.add('sound-on');
    btn.textContent = '🔊 Audio';
    audio.playClick();
  } else {
    btn.classList.remove('sound-on');
    btn.textContent = '🔇 Muted';
  }
}

// ─── MODE SWITCHING ────────────────────────────────────────────────────────────
function setMode(mode) {
  if (gameMode === mode) return;
  audio.playClick();
  gameMode = mode;
  
  // Style tabs
  document.getElementById('tabClassic').classList.toggle('active', mode === 'classic');
  document.getElementById('tabAI').classList.toggle('active', mode === 'ai');
  
  // Toggle HUD display
  document.getElementById('classicHUD').style.display = mode === 'classic' ? 'flex' : 'none';
  document.getElementById('aiHUD').style.display = mode === 'ai' ? 'grid' : 'none';

  // Toggle card active border color styling
  const card = document.getElementById('gameCard');
  card.classList.toggle('classic-active', mode === 'classic');
  card.classList.toggle('ai-active', mode === 'ai');

  // Instructions display toggle
  document.getElementById('instructionBar').style.opacity = mode === 'classic' ? '1' : '0.4';

  restartGame();
}

// ─── CONTROLS INPUT ────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (gameState !== 'playing' || gameMode !== 'classic') {
    if (e.key === ' ' || e.key === 'Spacebar') {
      e.preventDefault();
      togglePause();
    }
    if (e.key.toLowerCase() === 'r') {
      restartGame();
    }
    return;
  }

  let next = null;
  switch (e.key) {
    case 'ArrowUp':
    case 'w':
    case 'W':
      next = { x: 0, y: -1 };
      break;
    case 'ArrowDown':
    case 's':
    case 'S':
      next = { x: 0, y: 1 };
      break;
    case 'ArrowLeft':
    case 'a':
    case 'A':
      next = { x: -1, y: 0 };
      break;
    case 'ArrowRight':
    case 'd':
    case 'D':
      next = { x: 1, y: 0 };
      break;
    case ' ':
      e.preventDefault();
      togglePause();
      return;
    case 'r':
    case 'R':
      restartGame();
      return;
  }

  if (next) {
    e.preventDefault();
    // Prevent 180-degree immediate turns into own body
    const dir = classicSnake.dir;
    if (next.x !== -dir.x || next.y !== -dir.y) {
      classicSnake.nextDir = next;
    }
  }
});

function handleDpad(direction) {
  if (gameState !== 'playing' || gameMode !== 'classic') return;
  let next = null;
  switch (direction) {
    case 'up':    next = { x: 0, y: -1 }; break;
    case 'down':  next = { x: 0, y: 1 };  break;
    case 'left':  next = { x: -1, y: 0 }; break;
    case 'right': next = { x: 1, y: 0 };  break;
  }
  if (next) {
    const dir = classicSnake.dir;
    if (next.x !== -dir.x || next.y !== -dir.y) {
      classicSnake.nextDir = next;
    }
  }
}

function toggleDpadDisplay() {
  audio.playClick();
  const dpad = document.getElementById('dpadPanel');
  dpad.style.display = dpad.style.display === 'none' ? 'flex' : 'none';
}

// ─── DYNAMIC SPEED CONTROLLER ──────────────────────────────────────────────────
function handleSpeedChange(val) {
  currentSpeed = parseInt(val);
  document.getElementById('speedLabel').textContent = currentSpeed + 'x';
}

function getTickInterval() {
  return SPEED_INTERVALS[currentSpeed - 1];
}

// ─── PAUSE & RESUME ────────────────────────────────────────────────────────────
function togglePause() {
  audio.playClick();
  const pauseBtn = document.getElementById('pauseBtn');
  if (gameState === 'playing') {
    gameState = 'paused';
    pauseBtn.textContent = '▶ Resume';
  } else if (gameState === 'paused') {
    gameState = 'playing';
    pauseBtn.textContent = '⏸ Pause';
    lastTickTime = performance.now(); // reset delta
  } else if (gameState === 'gameover') {
    restartGame();
  }
}

// Auto-detect mobile to display D-Pad by default
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('dpadPanel').style.display = 'flex';
}

// ─── FOOD SPAWNING ─────────────────────────────────────────────────────────────
function spawnFood() {
  const occ = new Set();
  
  if (gameMode === 'classic') {
    for (const seg of classicSnake.body) {
      occ.add(ck(seg.x, seg.y));
    }
  } else {
    for (const sn of aiSnakes) {
      if (!sn.alive) continue;
      for (const seg of sn.body) {
        occ.add(ck(seg.x, seg.y));
      }
    }
  }
  for (const f of foods) {
    occ.add(ck(f.x, f.y));
  }

  let attempts = 0;
  while (foods.length < maxFoodCount && attempts < 4000) {
    attempts++;
    const pos = randomGridPos();
    if (!occ.has(ck(pos.x, pos.y))) {
      foods.push(pos);
      occ.add(ck(pos.x, pos.y));
    }
  }
}

// ─── GAME STATE TICK ENGINE ───────────────────────────────────────────────────
function tick() {
  if (gameState !== 'playing') return;

  if (gameMode === 'classic') {
    tickClassic();
  } else {
    tickAI();
  }
}

// ─── CLASSIC MODE TICK ─────────────────────────────────────────────────────────
function tickClassic() {
  // Apply direction change
  classicSnake.dir = classicSnake.nextDir;

  const head = classicSnake.body[0];
  const nextHead = {
    x: head.x + classicSnake.dir.x,
    y: head.y + classicSnake.dir.y
  };

  // Wall collisions
  if (nextHead.x < 0 || nextHead.x >= COLS || nextHead.y < 0 || nextHead.y >= ROWS) {
    triggerGameOver();
    return;
  }

  // Self collisions
  for (let i = 0; i < classicSnake.body.length - 1; i++) {
    const seg = classicSnake.body[i];
    if (nextHead.x === seg.x && nextHead.y === seg.y) {
      triggerGameOver();
      return;
    }
  }

  // Add new head segment
  classicSnake.body.unshift(nextHead);

  // Check food ingestion
  const fi = foods.findIndex(f => f.x === nextHead.x && f.y === nextHead.y);
  if (fi !== -1) {
    foods.splice(fi, 1);
    classicSnake.grow += 2;
    classicSnake.score += 10;
    
    // Play synthesis eat sound
    audio.playEat();
    
    // Particles
    spawnParticles(nextHead.x, nextHead.y, 'var(--neon-cyan)', 12);
    
    // Spawn food replacement
    spawnFood();

    // High Score tracking
    if (classicSnake.score > classicSnake.highScore) {
      if (!highScoreBeaten) {
        audio.playHighScore();
        highScoreBeaten = true;
      }
      classicSnake.highScore = classicSnake.score;
      localStorage.setItem('snake_highscore', classicSnake.highScore.toString());
      document.getElementById('classicHighScore').textContent = classicSnake.highScore;
    }
    
    document.getElementById('classicScore').textContent = classicSnake.score;
  }

  // Apply growth mechanics
  if (classicSnake.grow > 0) {
    classicSnake.grow--;
  } else {
    classicSnake.body.pop();
  }
}

function triggerGameOver() {
  gameState = 'gameover';
  audio.playDie();
  
  // Explode player head
  const head = classicSnake.body[0];
  spawnParticles(head.x, head.y, '#ffffff', 30);
  
  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.textContent = '↺ Play Again';
}

// ─── AI MODE TICK ──────────────────────────────────────────────────────────────
function buildBlocked(excludeTails) {
  const s = new Set();
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    const end = (excludeTails && sn.grow === 0) ? sn.body.length - 1 : sn.body.length;
    for (let i = 0; i < end; i++) {
      s.add(ck(sn.body[i].x, sn.body[i].y));
    }
  }
  return s;
}

// BFS logic to calculate path direction
function bfsStep(sx, sy, gx, gy, blocked) {
  if (sx === gx && sy === gy) return -1;
  const visited = new Uint8Array(COLS * ROWS);
  const q = []; // format: [x, y, firstDirIdx]
  visited[ck(sx, sy)] = 1;
  
  for (let di = 0; di < 4; di++) {
    const nx = sx + DIRS[di].x;
    const ny = sy + DIRS[di].y;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
    if (blocked.has(ck(nx, ny))) continue;
    if (visited[ck(nx, ny)]) continue;
    if (nx === gx && ny === gy) return di;
    visited[ck(nx, ny)] = 1;
    q.push(nx, ny, di);
  }

  let qi = 0;
  while (qi < q.length) {
    const x = q[qi++];
    const y = q[qi++];
    const fd = q[qi++];
    for (let di = 0; di < 4; di++) {
      const nx = x + DIRS[di].x;
      const ny = y + DIRS[di].y;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      if (blocked.has(ck(nx, ny))) continue;
      const nk = ck(nx, ny);
      if (visited[nk]) continue;
      visited[nk] = 1;
      if (nx === gx && ny === gy) return fd;
      q.push(nx, ny, fd);
    }
  }
  return -1;
}

// Safety check utilizing space flood counts
function floodCount(sx, sy, blocked) {
  if (blocked.has(ck(sx, sy))) return 0;
  const visited = new Uint8Array(COLS * ROWS);
  const q = [sx, sy];
  visited[ck(sx, sy)] = 1;
  let qi = 0, count = 0;
  while (qi < q.length) {
    const x = q[qi++];
    const y = q[qi++];
    count++;
    for (const d of DIRS) {
      const nx = x + d.x;
      const ny = y + d.y;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      const nk = ck(nx, ny);
      if (visited[nk] || blocked.has(nk)) continue;
      visited[nk] = 1;
      q.push(nx, ny);
    }
  }
  return count;
}

// Compute safe BFS or flood direction
function computeDir(snake) {
  const head = snake.body[0];
  const blocked = buildBlocked(true);
  
  // Remove own head from blockage for initialization
  blocked.delete(ck(head.x, head.y));

  // Determine standard moves
  const valid = DIRS.filter(d => {
    const nx = head.x + d.x;
    const ny = head.y + d.y;
    return nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !blocked.has(ck(nx, ny));
  });

  if (!valid.length) return snake.dir;

  // Pathfind using BFS to closest accessible food
  let bestDi = -1;
  let bestDist = Infinity;
  for (const food of foods) {
    const di = bfsStep(head.x, head.y, food.x, food.y, blocked);
    if (di === -1) continue;
    const dist = Math.abs(food.x - head.x) + Math.abs(food.y - head.y);
    if (dist < bestDist) {
      bestDist = dist;
      bestDi = di;
    }
  }

  const blockedPlusHead = new Set(blocked);
  blockedPlusHead.add(ck(head.x, head.y));

  // Safety flood validation
  if (bestDi !== -1) {
    const d = DIRS[bestDi];
    const nx = head.x + d.x;
    const ny = head.y + d.y;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !blocked.has(ck(nx, ny))) {
      const space = floodCount(nx, ny, blockedPlusHead);
      if (space >= snake.body.length) return d;
    }
  }

  // Backup fallback: Pick direction with largest free space
  let bestDir = snake.dir;
  let bestSpace = -1;
  for (const d of valid) {
    const nx = head.x + d.x;
    const ny = head.y + d.y;
    const space = floodCount(nx, ny, blockedPlusHead);
    if (space > bestSpace) {
      bestSpace = space;
      bestDir = d;
    }
  }
  return bestDir;
}

// Tick execution for AI Combat
function tickAI() {
  // 1. Calculate direction decisions
  const dirs = {};
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    dirs[sn.id] = computeDir(sn);
  }

  // 2. Compute future head positions
  const newHeads = {};
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    sn.dir = dirs[sn.id];
    newHeads[sn.id] = {
      x: sn.body[0].x + sn.dir.x,
      y: sn.body[0].y + sn.dir.y
    };
  }

  // 3. Populate blocked slots
  const bodyBlocked = new Set();
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    const end = sn.grow > 0 ? sn.body.length : sn.body.length - 1;
    for (let i = 0; i < end; i++) {
      bodyBlocked.add(ck(sn.body[i].x, sn.body[i].y));
    }
  }

  // 4. Run death logic on active snakes
  const dying = new Set();
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    const nh = newHeads[sn.id];
    
    // Bounds check
    if (nh.x < 0 || nh.x >= COLS || nh.y < 0 || nh.y >= ROWS) {
      dying.add(sn.id);
      continue;
    }
    
    // Body collision check
    if (bodyBlocked.has(ck(nh.x, nh.y))) {
      dying.add(sn.id);
    }
  }

  // Head-on collisions
  const alive = aiSnakes.filter(s => s.alive && !dying.has(s.id));
  for (let i = 0; i < alive.length; i++) {
    for (let j = i + 1; j < alive.length; j++) {
      const a = newHeads[alive[i].id];
      const b = newHeads[alive[j].id];
      if (a.x === b.x && a.y === b.y) {
        dying.add(alive[i].id);
        dying.add(alive[j].id);
      }
    }
  }

  // 5. Update coordinates & apply death transitions
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    if (dying.has(sn.id)) {
      sn.alive = false;
      audio.playDie();
      // Explode AI head
      const h = sn.body[0];
      spawnParticles(h.x, h.y, sn.hc, 20);
      continue;
    }
    sn.body.unshift(newHeads[sn.id]);
    if (sn.grow > 0) {
      sn.grow--;
    } else {
      sn.body.pop();
    }
  }

  // 6. Food feeding logic
  for (const sn of aiSnakes) {
    if (!sn.alive) continue;
    const h = sn.body[0];
    const fi = foods.findIndex(f => f.x === h.x && f.y === h.y);
    if (fi !== -1) {
      foods.splice(fi, 1);
      sn.grow += 3;
      sn.score += 10;
      audio.playEat();
      
      // Spawn particles
      spawnParticles(h.x, h.y, sn.hc, 10);
      spawnFood();
    }
  }

  // 7. Verify Arena ending constraints
  const remaining = aiSnakes.filter(s => s.alive);
  if (remaining.length <= 1) {
    gameState = 'gameover';
    winner = remaining.length === 1 ? remaining[0] : null;
    audio.playHighScore(); // Fanfare
    document.getElementById('pauseBtn').textContent = '↺ Play Again';
  }

  updateHUD();
}

// HUD updates for AI Battle mode
function updateHUD() {
  for (const sn of aiSnakes) {
    const card = document.getElementById(`card-${sn.id}`);
    card.classList.toggle('dead', !sn.alive);
    
    const st = document.getElementById(`status-${sn.id}`);
    st.className = 'card-status ' + (sn.alive ? 'alive' : 'dead');
    st.textContent = sn.alive ? 'ALIVE' : 'DEAD';
    
    document.getElementById(`score-${sn.id}`).textContent = sn.score;
    document.getElementById(`length-${sn.id}`).textContent = sn.body.length;
  }
}

// ─── RENDERING GRAPHICS ────────────────────────────────────────────────────────
function lerpColor(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1, 3), 16);
  const g1 = parseInt(hex1.slice(3, 5), 16);
  const b1 = parseInt(hex1.slice(5, 7), 16);

  const r2 = parseInt(hex2.slice(1, 3), 16);
  const g2 = parseInt(hex2.slice(3, 5), 16);
  const b2 = parseInt(hex2.slice(5, 7), 16);

  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);

  return `rgb(${r}, ${g}, ${b})`;
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawSnake(body, hc, bc, dir, alive) {
  const n = body.length;
  if (n === 0) return;

  // Draw snake body with tail tapering and glow effect
  for (let i = n - 1; i >= 0; i--) {
    const seg = body[i];
    
    // Tapering factor (tail segment is slightly smaller than head segment)
    const taper = n === 1 ? 0 : i / (n - 1);
    const sizeScale = 1.0 - taper * 0.35; // scales from 1.0 down to 0.65
    
    const pad = (CELL * (1 - sizeScale)) / 2 + (i === 0 ? 0.5 : 1.2);
    const px = seg.x * CELL + pad;
    const py = seg.y * CELL + pad;
    const sz = CELL - pad * 2;

    if (i === 0) {
      // Glow head
      ctx.fillStyle = hc;
      ctx.shadowColor = hc;
      ctx.shadowBlur = alive ? 12 : 0;
    } else {
      ctx.fillStyle = lerpColor(hc, bc, Math.pow(taper, 0.6));
      ctx.shadowBlur = 0;
    }

    drawRoundedRect(px, py, sz, sz, i === 0 ? 4 : 3);
    ctx.fill();
  }
  ctx.shadowBlur = 0; // Reset canvas shadows

  // Draw eyes on the snake head
  if (alive) {
    const head = body[0];
    const hx = head.x * CELL + CELL / 2;
    const hy = head.y * CELL + CELL / 2;
    
    let e1x, e1y, e2x, e2y;
    const offset = 2.4;
    const pupilShift = 3.2;

    if (dir.x === 1) {
      e1x = hx + pupilShift; e1y = hy - offset;
      e2x = hx + pupilShift; e2y = hy + offset;
    } else if (dir.x === -1) {
      e1x = hx - pupilShift; e1y = hy - offset;
      e2x = hx - pupilShift; e2y = hy + offset;
    } else if (dir.y === 1) {
      e1x = hx - offset; e1y = hy + pupilShift;
      e2x = hx + offset; e2y = hy + pupilShift;
    } else {
      e1x = hx - offset; e1y = hy - pupilShift;
      e2x = hx + offset; e2y = hy - pupilShift;
    }

    // White Sclera
    ctx.fillStyle = '#ffffff';
    for (const [ex, ey] of [[e1x, e1y], [e2x, e2y]]) {
      ctx.beginPath();
      ctx.arc(ex, ey, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Dark Pupil
    ctx.fillStyle = '#07070e';
    for (const [ex, ey] of [[e1x, e1y], [e2x, e2y]]) {
      ctx.beginPath();
      ctx.arc(ex + dir.x * 0.4, ey + dir.y * 0.4, 0.95, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function render() {
  const now = performance.now();

  // Clear Canvas (Void background color)
  ctx.fillStyle = '#05050b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw Grid Layer
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.022)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, ROWS * CELL);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(COLS * CELL, y * CELL);
    ctx.stroke();
  }

  // Draw Food Orbs (Pulsing glows)
  const pulse = 0.8 + 0.2 * Math.sin(now / 160);
  for (const food of foods) {
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const r = CELL * 0.28 * pulse;

    // Outer glow gradient
    const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, r * 3);
    gradient.addColorStop(0, 'rgba(57, 255, 20, 0.55)');
    gradient.addColorStop(1, 'rgba(57, 255, 20, 0)');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(fx, fy, r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Solid core orb
    ctx.fillStyle = varColor('food-color');
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw Snakes depending on active mode
  if (gameMode === 'classic') {
    drawSnake(
      classicSnake.body, 
      varColor('neon-cyan'), 
      varColor('neon-cyan-dark'), 
      classicSnake.dir, 
      gameState !== 'gameover'
    );
  } else {
    for (const sn of aiSnakes) {
      if (sn.alive || sn.body.length > 0) {
        drawSnake(sn.body, sn.hc, sn.bc, sn.dir, sn.alive);
      }
    }
  }

  // Update & Draw Particles
  updateParticles();
  drawParticles();

  // Overlay Screens (Pause, Gameover)
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(5, 5, 11, 0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    
    ctx.font = '700 28px Outfit';
    ctx.fillText('GAME PAUSED', canvas.width / 2, canvas.height / 2 - 10);
    ctx.font = '400 14px Outfit';
    ctx.fillStyle = varColor('muted');
    ctx.fillText('Press SPACE to Resume', canvas.width / 2, canvas.height / 2 + 20);
  } 
  else if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(5, 5, 11, 0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    if (gameMode === 'classic') {
      ctx.font = '800 32px Outfit';
      ctx.fillStyle = varColor('neon-coral');
      ctx.fillText('GAME OVER', cx, cy - 25);

      ctx.font = '600 16px Outfit';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(`Score: ${classicSnake.score}   ·   High Score: ${classicSnake.highScore}`, cx, cy + 15);
      
      ctx.font = '400 13px Outfit';
      ctx.fillStyle = varColor('muted');
      ctx.fillText('Press RESTART to try again', cx, cy + 45);
    } else {
      if (winner) {
        ctx.font = '800 28px Outfit';
        ctx.fillStyle = winner.hc;
        ctx.shadowColor = winner.hc;
        ctx.shadowBlur = 18;
        ctx.fillText(`${winner.name.toUpperCase()} AI WINS! 🏆`, cx, cy - 20);
        ctx.shadowBlur = 0;

        ctx.font = '600 15px Outfit';
        ctx.fillStyle = '#ffffff';
        ctx.fillText(`Score: ${winner.score}   ·   Length: ${winner.body.length}`, cx, cy + 15);
      } else {
        ctx.font = '800 26px Outfit';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('DRAW — ALL ELIMINATED!', cx, cy - 10);
      }
      ctx.font = '400 13px Outfit';
      ctx.fillStyle = varColor('muted');
      ctx.fillText('Press RESTART to trigger next match', cx, cy + 45);
    }
  }
}

// Fetch css variable colors safely
function varColor(variableName) {
  return getComputedStyle(document.documentElement).getPropertyValue('--' + variableName).trim();
}

// ─── MAIN ENGINE LOOP ──────────────────────────────────────────────────────────
function mainLoop(timestamp) {
  if (!lastTickTime) lastTickTime = timestamp;
  const elapsed = timestamp - lastTickTime;
  const interval = getTickInterval();

  if (elapsed >= interval) {
    tick();
    lastTickTime = timestamp - (elapsed % interval); // Keep remainders for precision
  }

  render();
  rafId = requestAnimationFrame(mainLoop);
}

// ─── INITIALIZATION / RESTARTS ─────────────────────────────────────────────────
function makeAISnake(def) {
  const body = [];
  // Initialize snake growing tail in backwards delta direction
  for (let i = 0; i < 4; i++) {
    body.push({
      x: def.sx - def.dx * i,
      y: def.sy - def.dy * i
    });
  }
  return {
    id: def.id,
    name: def.name,
    cls: def.cls,
    hc: def.hc,
    bc: def.bc,
    body: body,
    dir: { x: def.dx, y: def.dy },
    grow: 0,
    alive: true,
    score: 0
  };
}

function restartGame() {
  if (rafId) cancelAnimationFrame(rafId);
  
  // Set default settings
  gameState = 'playing';
  winner = null;
  highScoreBeaten = false;
  foods = [];
  particles = [];
  
  // Pause UI button update
  document.getElementById('pauseBtn').textContent = '⏸ Pause';

  if (gameMode === 'classic') {
    maxFoodCount = 1;
    // Spawn player in center
    classicSnake.body = [];
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    for (let i = 0; i < 4; i++) {
      classicSnake.body.push({ x: cx - i, y: cy });
    }
    classicSnake.dir = { x: 1, y: 0 };
    classicSnake.nextDir = { x: 1, y: 0 };
    classicSnake.grow = 0;
    classicSnake.score = 0;
    
    document.getElementById('classicScore').textContent = '0';
  } else {
    maxFoodCount = 5;
    aiSnakes = AI_DEFS.map(makeAISnake);
    updateHUD();
  }

  spawnFood();
  lastTickTime = performance.now();
  
  // Start loop
  rafId = requestAnimationFrame(mainLoop);
}

// Initial start
restartGame();
</script>
