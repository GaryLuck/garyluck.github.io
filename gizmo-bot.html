<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gizmo-Bot Scrap Run</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:#0b1030;touch-action:none;
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif}
  #game{position:absolute;inset:0}

  /* ---------- main menu / garage ---------- */
  #menu{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;color:#fff;text-align:center;
    background:radial-gradient(ellipse at 50% 30%,rgba(30,20,80,.88),rgba(6,8,26,.94));
    padding:calc(10px + env(safe-area-inset-top)) 16px calc(10px + env(safe-area-inset-bottom))}
  #menu h1{font-size:min(8vw,58px);line-height:1.02;letter-spacing:2px;text-shadow:0 0 26px rgba(40,220,255,.6)}
  #menu h1 span{display:block;font-size:.5em;letter-spacing:10px;color:#2ee6ff}
  #runResult{background:linear-gradient(#3a2f00,#241c00);border:2px solid #ffd44d;color:#ffd44d;
    border-radius:999px;padding:8px 22px;font-size:19px;font-weight:700;box-shadow:0 0 18px rgba(255,212,77,.35)}
  #scrapTotal{font-size:21px;font-weight:800;color:#ffd44d}
  #preview{width:min(46vw,240px);height:auto}
  .label{font-size:14px;letter-spacing:4px;color:#8fa2d4;font-weight:700;margin-top:2px}
  #paints{display:flex;gap:14px}
  .swatch{width:54px;height:54px;border-radius:50%;border:4px solid rgba(255,255,255,.15);cursor:pointer}
  .swatch.sel{border-color:#fff;box-shadow:0 0 18px 2px rgba(255,255,255,.45)}
  #parts{display:flex;gap:12px}
  .part{width:104px;padding:10px 6px;border-radius:16px;background:#151b38;border:3px solid #2b3562;
    color:#fff;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;gap:2px;align-items:center}
  .part .ico{font-size:30px}
  .part .nm{font-size:13px;font-weight:700}
  .part .st{font-size:13px;font-weight:800;color:#ffd44d}
  .part.sel{border-color:#2ee6ff;box-shadow:0 0 14px rgba(46,230,255,.4)}
  .part.sel .st{color:#2ee6ff}
  .part.locked{opacity:.65}
  #startBtn{margin-top:6px;font-family:inherit;font-size:min(7vw,32px);font-weight:800;letter-spacing:2px;
    padding:16px 58px;border-radius:999px;border:0;color:#053312;cursor:pointer;
    background:linear-gradient(#5cff8e,#0cc355);box-shadow:0 7px 0 #077a35,0 0 30px rgba(60,255,140,.35)}
  #startBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #077a35}

  /* ---------- in-game home button ---------- */
  #homeBtn{position:absolute;z-index:5;top:calc(10px + env(safe-area-inset-top));right:12px;width:56px;height:56px;
    border-radius:50%;border:2px solid rgba(255,255,255,.4);background:rgba(20,26,60,.55);font-size:26px;cursor:pointer}
  .hidden{display:none!important}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="menu">
  <h1>GIZMO-BOT<span>SCRAP RUN</span></h1>
  <div id="runResult" class="hidden"></div>
  <div id="scrapTotal">🔩 Scrap: 0</div>
  <canvas id="preview" width="480" height="380"></canvas>
  <div class="label">PAINT</div>
  <div id="paints"></div>
  <div class="label">PARTS</div>
  <div id="parts"></div>
  <button id="startBtn">▶&nbsp; START!</button>
</div>

<button id="homeBtn" class="hidden">🏠</button>

<script>
'use strict';
// ============================================================ helpers
const $=id=>document.getElementById(id);
const TAU=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.random()*a.length|0];
function rr(c,x,y,w,h,r){ // rounded rect path (works on older Safari too)
  r=Math.min(r,w/2,h/2);
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r);
  c.closePath();
}

// ============================================================ saved progress
const PAINTS={cyan:'#2ee6ff',pink:'#ff5fd7',green:'#4dff77',gold:'#ffd44d'};
const WHEELS={
  wheels:  {name:'Roller Wheels', ico:'🛞', cost:0},
  treads:  {name:'Tractor Treads',ico:'🚜', cost:50},
  boosters:{name:'Rocket Boosters',ico:'🚀',cost:100},
};
let save={scrap:0,color:'cyan',wheels:'wheels',unlocked:['wheels']};
try{Object.assign(save,JSON.parse(localStorage.getItem('gizmobot')||'{}'));}catch(e){}
if(!save.unlocked.includes('wheels'))save.unlocked.push('wheels');
function persist(){try{localStorage.setItem('gizmobot',JSON.stringify(save));}catch(e){}}

// ============================================================ canvas
const canvas=$('game'),ctx=canvas.getContext('2d');
let W=0,H=0;
function resize(){
  const dpr=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();
const GROUND=()=>H-64;

// background stars (regenerated on demand to cover any screen size)
let stars=[];
function makeStars(){stars=[];for(let i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*(H-120),r:rand(.8,2.2),p:rand(0,TAU)});}
makeStars();
window.addEventListener('resize',makeStars);

// ============================================================ synthesized audio (Web Audio API)
let AC=null;
function audio(){
  if(!AC){const A=window.AudioContext||window.webkitAudioContext;if(A)AC=new A();}
  if(AC&&AC.state==='suspended')AC.resume();
  return AC;
}
function tone(freq,dur,type,vol,delay,slideTo){
  const ac=audio();if(!ac)return;
  const t=ac.currentTime+(delay||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,t);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(vol||.15,t);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(ac.destination);
  o.start(t);o.stop(t+dur+.05);
}
function noiseBurst(dur,vol,delay){
  const ac=audio();if(!ac)return;
  const n=ac.sampleRate*dur|0,buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=ac.createBufferSource(),g=ac.createGain();
  s.buffer=buf;g.gain.value=vol;
  s.connect(g);g.connect(ac.destination);
  s.start(ac.currentTime+(delay||0));
}
const sfx={
  gear(){tone(660,.1,'square',.1,0,990);},
  battery(){tone(330,.09,'sawtooth',.11);tone(494,.14,'sawtooth',.11,.08);},
  chip(){[1047,1319,1568,2093].forEach((f,i)=>tone(f,.35,'sine',.13,i*.07));},
  pickup(){tone(880,.07,'square',.08,0,1320);},
  crash(){ // goofy dizzy wobble
    noiseBurst(.25,.18);
    tone(420,.5,'sawtooth',.16,0,90);
    [500,400,500,400,300].forEach((f,i)=>tone(f,.12,'square',.09,.08+i*.11));
  },
  levelUp(){[523,659,784,1047,784,1319].forEach((f,i)=>tone(f,.28,'triangle',.15,i*.09));},
  magnet(){tone(180,.7,'sawtooth',.13,0,880);[900,1200,1500].forEach((f,i)=>tone(f,.5,'sine',.07,.15+i*.12));},
  magnetOff(){tone(700,.4,'sawtooth',.1,0,140);},
  nope(){tone(180,.2,'square',.12,0,120);},
  buy(){[600,900,1200].forEach((f,i)=>tone(f,.15,'square',.1,i*.06));},
};
// unlock audio on the very first touch anywhere (iOS requirement)
document.addEventListener('pointerdown',()=>audio(),{once:true});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ============================================================ game state
let scene='menu';           // 'menu' | 'play'
let items=[];               // falling collectibles + junk
let drops=[];               // gears knocked loose, sitting on the floor
let confetti=[], sparks=[], floaters=[];
let score=0,celebrated=0,badgeT=0,runT=0,spawnT=0,hintT=0;
const bot={x:0,tx:0,dizzy:0,invuln:0,spin:0,wheelSpin:0,look:0};
const magnet={charge:0,active:0};

function startRun(){
  scene='play';
  items=[];drops=[];confetti=[];sparks=[];floaters=[];
  score=0;celebrated=0;badgeT=0;runT=0;spawnT=.8;hintT=4.5;
  bot.x=bot.tx=W/2;bot.dizzy=0;bot.invuln=0;bot.spin=0;
  magnet.charge=0;magnet.active=0;
  $('menu').classList.add('hidden');
  $('homeBtn').classList.remove('hidden');
  audio();
}
function endRun(){
  save.scrap+=score;persist();
  scene='menu';
  const rr=$('runResult');
  rr.textContent='⭐ Great run! You collected 🔩 '+score+' scrap!';
  rr.classList.remove('hidden');
  $('menu').classList.remove('hidden');
  $('homeBtn').classList.add('hidden');
  refreshMenu();
}

// ============================================================ input — slide finger to steer
let dragId=null;
canvas.addEventListener('pointerdown',e=>{
  if(scene!=='play')return;
  dragId=e.pointerId;bot.tx=e.clientX;hintT=Math.min(hintT,.6);
});
canvas.addEventListener('pointermove',e=>{
  if(scene==='play'&&e.pointerId===dragId)bot.tx=e.clientX;
});
const endDrag=e=>{if(e.pointerId===dragId)dragId=null;};
canvas.addEventListener('pointerup',endDrag);
canvas.addEventListener('pointercancel',endDrag);
$('homeBtn').addEventListener('click',()=>{if(scene==='play')endRun();});

// ============================================================ spawning
function spawnItem(){
  const r=Math.random();
  let kind = r<.44?'gear' : r<.62?'battery' : r<.74?'chip' : 'junk';
  if(kind==='junk'&&runT<6)kind='gear';           // gentle start: no scrap metal at first
  const it={
    kind,
    x:rand(46,W-46), y:-60,
    vy:rand(110,160)+Math.min(150,celebrated*14),
    rot:rand(0,TAU), vr:rand(-2.5,2.5),
    r: kind==='junk'?rand(24,32):21,
  };
  if(kind==='junk')it.junk=pick(['tire','beam','oldgear']);
  items.push(it);
}

// ============================================================ update
function update(dt){
  runT+=dt;const gy=GROUND(),by=gy-42;

  // ---- robot movement (finger-follow, disabled while dizzy)
  if(bot.dizzy>0){
    bot.dizzy-=dt;bot.spin+=dt*11;
    if(bot.dizzy<=0){bot.spin=0;bot.tx=bot.x;}
  }else{
    const speed=save.wheels==='boosters'?13:9;
    const px=bot.x;
    bot.x+=(clamp(bot.tx,44,W-44)-bot.x)*Math.min(1,dt*speed);
    bot.wheelSpin+=(bot.x-px)/15;
    bot.look=clamp((bot.tx-bot.x)*.08,-4,4);
  }
  bot.invuln=Math.max(0,bot.invuln-dt);

  // ---- magnet power
  if(magnet.active>0){
    magnet.active-=dt;
    magnet.charge=100*Math.max(0,magnet.active)/5;
    if(magnet.active<=0){magnet.charge=0;sfx.magnetOff();}
  }else if(magnet.charge>=100){
    magnet.active=5;sfx.magnet();
    floaters.push({x:bot.x,y:by-90,text:'🧲 TURBO MAGNET!',life:1.6,color:'#ff5fd7',big:true});
  }

  // ---- spawn falling stuff
  spawnT-=dt;
  if(spawnT<=0&&items.length<40){
    spawnItem();
    spawnT=Math.max(.5,.95-celebrated*.05)*rand(.75,1.25);
  }

  // ---- falling items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.rot+=it.vr*dt;
    if(magnet.active>0&&it.kind!=='junk'){        // rainbow forcefield pulls everything in
      const dx=bot.x-it.x,dy=by-it.y,d=Math.hypot(dx,dy)||1;
      const sp=560;
      it.x+=dx/d*sp*dt;it.y+=dy/d*sp*dt;
      if(Math.random()<.3)sparks.push({x:it.x,y:it.y,vx:rand(-30,30),vy:rand(-30,30),life:.4,color:'hsl('+(Math.random()*360|0)+',100%,70%)'});
    }else{
      it.y+=it.vy*dt;
    }
    if(it.y>H+70){items.splice(i,1);continue;}

    // collision with robot
    const d=Math.hypot(it.x-bot.x,it.y-by);
    if(d<it.r+44){
      if(it.kind==='junk'){
        if(bot.invuln<=0&&bot.dizzy<=0){
          items.splice(i,1);
          hitByJunk(by);
        }
        continue;
      }
      items.splice(i,1);
      collect(it);
    }
  }

  // ---- dropped gears bouncing on the floor
  for(let i=drops.length-1;i>=0;i--){
    const g=drops[i];
    g.delay-=dt;
    g.vy+=900*dt;g.x+=g.vx*dt;g.y+=g.vy*dt;g.rot+=g.vx*.02*dt*60;
    if(g.x<20||g.x>W-20)g.vx*=-0.7;
    if(g.y>gy-14){g.y=gy-14;g.vy*=-0.45;g.vx*=.75;if(Math.abs(g.vy)<40)g.vy=0;}
    if(g.delay<=0&&Math.hypot(g.x-bot.x,g.y-by)<52){
      drops.splice(i,1);score+=1;sfx.pickup();
      floaters.push({x:g.x,y:g.y-20,text:'+1',life:.8,color:'#fff'});
      checkMilestone();
    }
  }

  // ---- particles & popups
  for(let i=confetti.length-1;i>=0;i--){
    const p=confetti[i];
    p.vy+=260*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.vr*dt;p.life-=dt;
    if(p.life<=0||p.y>H+20)confetti.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0)sparks.splice(i,1);
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y-=45*dt;f.life-=dt;
    if(f.life<=0)floaters.splice(i,1);
  }
  badgeT=Math.max(0,badgeT-dt);
  hintT=Math.max(0,hintT-dt);
}

function collect(it){
  let val=1,color='#e8f0ff';
  if(it.kind==='battery'){
    val=2;color='#4dff77';
    if(magnet.active<=0)magnet.charge=Math.min(100,magnet.charge+25);
    sfx.battery();
  }else if(it.kind==='chip'){
    val=5;color='#ffd44d';sfx.chip();
  }else sfx.gear();
  score+=val;
  floaters.push({x:it.x,y:it.y-16,text:'+'+val,life:.9,color});
  for(let i=0;i<6;i++)sparks.push({x:it.x,y:it.y,vx:rand(-90,90),vy:rand(-90,90),life:.35,color});
  checkMilestone();
}

function hitByJunk(by){
  bot.dizzy=1.6;bot.invuln=2.6;
  sfx.crash();
  const n=Math.min(3,score);
  score-=n;
  for(let i=0;i<n;i++)drops.push({
    x:bot.x,y:by-20,vx:rand(-190,190),vy:rand(-380,-220),rot:rand(0,TAU),delay:.9,
  });
  if(n>0)floaters.push({x:bot.x,y:by-90,text:'-'+n,life:1,color:'#ff7b7b'});
  floaters.push({x:bot.x,y:by-115,text:'WHOA! 💫',life:1.2,color:'#fff',big:true});
}

function checkMilestone(){ // every 50 points → party!
  while(score>=(celebrated+1)*50){
    celebrated++;
    badgeT=2.4;
    sfx.levelUp();
    for(let i=0;i<110;i++)confetti.push({
      x:rand(0,W),y:rand(-H*.3,0),vx:rand(-60,60),vy:rand(30,150),
      rot:rand(0,TAU),vr:rand(-8,8),size:rand(6,12),life:rand(2,3.4),
      color:pick(['#ff5fd7','#2ee6ff','#4dff77','#ffd44d','#ff9d2e','#b28cff']),
    });
  }
}

// ============================================================ drawing
function drawGearShape(c,x,y,r,rot,color,holeColor){
  c.save();c.translate(x,y);c.rotate(rot);
  c.fillStyle=color;
  for(let i=0;i<8;i++){c.save();c.rotate(i/8*TAU);c.fillRect(-r*.16,-r*1.12,r*.32,r*.4);c.restore();}
  c.beginPath();c.arc(0,0,r*.85,0,TAU);c.fill();
  c.fillStyle=holeColor;
  c.beginPath();c.arc(0,0,r*.34,0,TAU);c.fill();
  c.restore();
}

function drawItem(it,t){
  const c=ctx;
  c.save();c.translate(it.x,it.y);
  if(it.kind==='gear'){
    c.rotate(it.rot);c.translate(-it.x,-it.y);
    c.shadowColor='#bcd0ff';c.shadowBlur=8;
    drawGearShape(c,it.x,it.y,18,0,'#c3cede','#5c6a86');
  }else if(it.kind==='battery'){
    c.rotate(Math.sin(it.rot)*.35);
    c.shadowColor='#4dff77';c.shadowBlur=12;
    c.fillStyle='#2fd45d';rr(c,-13,-19,26,38,6);c.fill();
    c.shadowBlur=0;
    c.fillStyle='#9fffbd';rr(c,-6,-24,12,6,2);c.fill();
    c.fillStyle='#0a4d20';c.font='bold 20px system-ui';c.textAlign='center';c.textBaseline='middle';
    c.fillText('⚡',0,2);
  }else if(it.kind==='chip'){
    c.rotate(Math.sin(it.rot)*.3);
    const glow=.6+.4*Math.sin(t*6+it.rot);
    c.shadowColor='#ffd44d';c.shadowBlur=16*glow;
    c.fillStyle='#1c2440';rr(c,-16,-16,32,32,5);c.fill();
    c.fillStyle='#ffd44d';
    for(let i=-1;i<=1;i++){c.fillRect(-21,i*9-2,5,4);c.fillRect(16,i*9-2,5,4);}
    c.fillStyle='rgba(255,212,77,'+(.55+.45*glow)+')';rr(c,-8,-8,16,16,3);c.fill();
  }else{ // junk hazards
    c.rotate(it.rot);
    c.shadowColor='#000';c.shadowBlur=6;
    if(it.junk==='tire'){
      c.fillStyle='#20242e';c.beginPath();c.arc(0,0,it.r,0,TAU);c.fill();
      c.strokeStyle='#3a4152';c.lineWidth=4;
      for(let i=0;i<6;i++){const a=i/6*TAU;c.beginPath();c.moveTo(Math.cos(a)*it.r*.55,Math.sin(a)*it.r*.55);c.lineTo(Math.cos(a)*it.r*.92,Math.sin(a)*it.r*.92);c.stroke();}
      c.fillStyle='#495164';c.beginPath();c.arc(0,0,it.r*.34,0,TAU);c.fill();
    }else if(it.junk==='beam'){
      c.fillStyle='#6b6355';rr(c,-it.r*1.3,-it.r*.38,it.r*2.6,it.r*.76,4);c.fill();
      c.fillStyle='#4c463c';
      for(let i=-1;i<=1;i++){c.beginPath();c.arc(i*it.r*.85,0,3.5,0,TAU);c.fill();}
    }else{
      c.translate(-0,0);
      drawGearShape(c,0,0,it.r*.8,0,'#8a5a35','#59391f'); // rusty old gear
    }
  }
  c.restore();
}

function drawBot(c,x,y,o){
  const col=PAINTS[o.color]||PAINTS.cyan;
  const t=o.t||0;
  c.save();c.translate(x,y+(o.rise||0));
  if(o.spin)c.rotate(o.spin);

  // ------- base: wheels / treads / boosters
  if(o.wheelType==='treads'){
    c.fillStyle='#232837';rr(c,-46,12,92,28,14);c.fill();
    c.fillStyle='#4a5568';
    for(let i=0;i<5;i++){c.beginPath();c.arc(-34+i*17,26,7.5,0,TAU);c.fill();}
  }else if(o.wheelType==='boosters'){
    for(const bx of[-22,22]){
      const f=(1+Math.sin(t*26+bx)*.3)*(o.flame===undefined?1:o.flame);
      c.fillStyle='#ff9d2e';
      c.beginPath();c.moveTo(bx-9,22);c.lineTo(bx+9,22);c.lineTo(bx,22+26*f);c.closePath();c.fill();
      c.fillStyle='#ffe66d';
      c.beginPath();c.moveTo(bx-4.5,22);c.lineTo(bx+4.5,22);c.lineTo(bx,22+14*f);c.closePath();c.fill();
      c.fillStyle='#8892a6';rr(c,bx-11,8,22,16,6);c.fill();
    }
  }else{
    for(const wx of[-25,25]){
      c.save();c.translate(wx,24);c.rotate(o.wheelSpin||0);
      c.fillStyle='#20242e';c.beginPath();c.arc(0,0,17,0,TAU);c.fill();
      c.fillStyle='#4a5568';c.fillRect(-2,-13,4,26);c.fillRect(-13,-2,26,4);
      c.beginPath();c.arc(0,0,6,0,TAU);c.fill();
      c.restore();
    }
  }

  // ------- body
  const bob=o.bob||0;
  c.save();c.translate(0,bob);
  c.shadowColor=col;c.shadowBlur=20;
  c.fillStyle=col;rr(c,-34,-38,68,56,13);c.fill();
  c.shadowBlur=0;
  c.fillStyle='rgba(8,12,30,.5)';rr(c,-20,-28,40,28,8);c.fill();
  c.font='bold 17px system-ui';c.textAlign='center';c.textBaseline='middle';
  c.fillText('⚡',0,-13);
  // little arms
  c.fillStyle='#8892a6';rr(c,-44,-24,10,24,5);c.fill();rr(c,34,-24,10,24,5);c.fill();

  // ------- head
  c.fillStyle='#dfe8f2';
  c.beginPath();c.arc(0,-38,22,Math.PI,0);c.closePath();c.fill();
  c.fillStyle='#0c1224';rr(c,-16,-56,32,15,7);c.fill();
  if(o.dizzy){
    c.strokeStyle=col;c.lineWidth=2.5;c.lineCap='round';
    for(const ex of[-8,8]){
      c.beginPath();c.moveTo(ex-3.5,-52);c.lineTo(ex+3.5,-45);c.moveTo(ex+3.5,-52);c.lineTo(ex-3.5,-45);c.stroke();
    }
  }else{
    c.fillStyle=col;
    const lk=o.look||0;
    c.beginPath();c.arc(-8+lk,-48.5,3.6,0,TAU);c.arc(8+lk,-48.5,3.6,0,TAU);c.fill();
    // smile
    c.strokeStyle=col;c.lineWidth=2;c.lineCap='round';
    c.beginPath();c.arc(lk*.5,-47,8,TAU*.08,TAU*.42);c.stroke();
  }
  // antenna
  c.strokeStyle='#8892a6';c.lineWidth=3;
  c.beginPath();c.moveTo(0,-60);c.lineTo(0,-72);c.stroke();
  c.shadowColor=col;c.shadowBlur=12;
  c.fillStyle=col;c.beginPath();c.arc(0,-76,4.5+Math.sin(t*5)*1,0,TAU);c.fill();
  c.shadowBlur=0;
  c.restore();

  // ------- rainbow magnet forcefield
  if(o.magnet){
    c.lineWidth=4;
    for(let i=0;i<3;i++){
      c.globalAlpha=.55-i*.13;
      c.strokeStyle='hsl('+((t*140+i*70)%360)+',100%,62%)';
      c.beginPath();c.arc(0,-20,66+i*13+Math.sin(t*7+i)*4,0,TAU);c.stroke();
    }
    c.globalAlpha=1;
  }
  // ------- dizzy stars orbit the head
  if(o.dizzy){
    c.fillStyle='#ffd44d';c.font='16px system-ui';c.textAlign='center';c.textBaseline='middle';
    for(let i=0;i<3;i++){
      const a=t*5+i*TAU/3;
      c.fillText('✦',Math.cos(a)*30,-84+Math.sin(a)*7);
    }
  }
  c.restore();
}

function drawBackground(t){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0e2c');g.addColorStop(.6,'#171040');g.addColorStop(1,'#221244');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // twinkly stars
  for(const s of stars){
    ctx.globalAlpha=.4+.6*Math.abs(Math.sin(t*.9+s.p));
    ctx.fillStyle='#cfe2ff';
    ctx.fillRect(s.x,s.y,s.r,s.r);
  }
  ctx.globalAlpha=1;
  // distant junk pile silhouettes
  const gy=GROUND();
  ctx.fillStyle='rgba(10,14,40,.9)';
  ctx.beginPath();ctx.moveTo(0,gy);
  for(let x=0;x<=W;x+=90)ctx.lineTo(x+45,gy-30-40*Math.abs(Math.sin(x*.71)));
  ctx.lineTo(W,gy);ctx.closePath();ctx.fill();
  // metal floor
  ctx.fillStyle='#1b2140';ctx.fillRect(0,gy,W,H-gy);
  ctx.fillStyle=PAINTS[save.color];ctx.globalAlpha=.8;
  ctx.fillRect(0,gy,W,3);ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,.05)';
  for(let x=20;x<W;x+=70)ctx.fillRect(x,gy+14,36,6);
}

function drawHUD(t){
  // score
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.font='bold 30px "Trebuchet MS",system-ui';
  ctx.fillStyle='#fff';
  ctx.shadowColor='#000';ctx.shadowBlur=6;
  ctx.fillText('⚙️ '+score,18,44);
  ctx.shadowBlur=0;
  if(celebrated>0){
    ctx.font='bold 16px "Trebuchet MS",system-ui';
    ctx.fillStyle='#ffd44d';
    ctx.fillText('LEVEL '+celebrated,20,72);
  }
  // magnet power bar
  const bw=Math.min(320,W*.42),bx=(W-bw)/2,byy=26;
  ctx.fillStyle='rgba(10,14,36,.7)';rr(ctx,bx-30,byy-14,bw+38,28,14);ctx.fill();
  ctx.font='18px system-ui';ctx.textAlign='center';
  ctx.fillText('🧲',bx-14,byy+1);
  ctx.fillStyle='#232a52';rr(ctx,bx+4,byy-8,bw-12,16,8);ctx.fill();
  const frac=clamp(magnet.charge/100,0,1);
  if(frac>0){
    ctx.fillStyle=magnet.active>0?'hsl('+((t*220)%360)+',100%,60%)':'#ff5fd7';
    rr(ctx,bx+4,byy-8,(bw-12)*frac,16,8);ctx.fill();
  }
  // level-up badge
  if(badgeT>0){
    const k=Math.min(1,(2.4-badgeT)/.35);
    const s=1.7-.7*(1-Math.pow(1-k,3)); // pop in
    const fade=Math.min(1,badgeT/.4);
    ctx.save();
    ctx.translate(W/2,H*.32);ctx.scale(s,s);ctx.globalAlpha=fade;
    ctx.shadowColor='#ffd44d';ctx.shadowBlur=30;
    ctx.fillStyle='#241c00';rr(ctx,-170,-52,340,104,26);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#ffd44d';ctx.lineWidth=4;rr(ctx,-170,-52,340,104,26);ctx.stroke();
    ctx.fillStyle='#ffd44d';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 34px "Trebuchet MS",system-ui';
    ctx.fillText('⭐ LEVEL '+celebrated+'! ⭐',0,-14);
    ctx.font='bold 18px "Trebuchet MS",system-ui';
    ctx.fillStyle='#fff';
    ctx.fillText('SUPER SCRAP COLLECTOR!',0,22);
    ctx.restore();
  }
  // finger hint
  if(hintT>0){
    ctx.globalAlpha=Math.min(1,hintT);
    ctx.font='bold 22px "Trebuchet MS",system-ui';ctx.textAlign='center';
    ctx.fillStyle='#fff';ctx.shadowColor='#000';ctx.shadowBlur=8;
    ctx.fillText('👉 Slide your finger to move Gizmo! 👈',W/2,GROUND()+38);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
}

function render(t){
  drawBackground(t);
  const gy=GROUND();
  // floor gears you can scoop back up
  for(const g of drops){
    ctx.save();
    ctx.shadowColor='#bcd0ff';ctx.shadowBlur=8;
    drawGearShape(ctx,g.x,g.y,15,g.rot,'#c3cede','#5c6a86');
    ctx.restore();
  }
  for(const it of items)drawItem(it,t);
  if(scene==='play'){
    const blink=bot.invuln>0&&bot.dizzy<=0&&Math.sin(t*24)>0;
    if(!blink)drawBot(ctx,bot.x,gy-40,{
      color:save.color,wheelType:save.wheels,t,
      wheelSpin:bot.wheelSpin,look:bot.look,
      spin:bot.dizzy>0?bot.spin:0,dizzy:bot.dizzy>0,
      bob:save.wheels==='boosters'?Math.sin(t*3)*3:0,
      rise:save.wheels==='boosters'?-8:0,
      magnet:magnet.active>0,
    });
  }
  // particles
  for(const p of sparks){
    ctx.globalAlpha=Math.min(1,p.life*3);
    ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;
  for(const p of confetti){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=Math.min(1,p.life);
    ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    ctx.restore();
  }
  ctx.globalAlpha=1;
  for(const f of floaters){
    ctx.globalAlpha=Math.min(1,f.life*2);
    ctx.font='bold '+(f.big?26:22)+'px "Trebuchet MS",system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=f.color;ctx.shadowColor='#000';ctx.shadowBlur=6;
    ctx.fillText(f.text,f.x,f.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
  if(scene==='play')drawHUD(t);
}

// ============================================================ menu / garage
const pctx=$('preview').getContext('2d');
function drawPreview(t){
  const c=pctx,pw=480,ph=380;
  c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,pw,ph);
  c.save();c.translate(pw/2,ph*.68);c.scale(2,2);
  drawBot(c,0,0,{
    color:save.color,wheelType:save.wheels,t,
    wheelSpin:t*2.5,bob:Math.sin(t*2.4)*3,look:Math.sin(t*.8)*4,
    rise:save.wheels==='boosters'?-6:0,
  });
  c.restore();
}
function refreshMenu(){
  $('scrapTotal').textContent='🔩 Scrap: '+save.scrap;
  // paint swatches
  const pd=$('paints');pd.innerHTML='';
  for(const k in PAINTS){
    const b=document.createElement('button');
    b.className='swatch'+(save.color===k?' sel':'');
    b.style.background=PAINTS[k];
    b.setAttribute('aria-label',k);
    b.onclick=()=>{save.color=k;persist();sfx.pickup();refreshMenu();};
    pd.appendChild(b);
  }
  // parts shop
  const wd=$('parts');wd.innerHTML='';
  for(const k in WHEELS){
    const w=WHEELS[k],owned=save.unlocked.includes(k);
    const b=document.createElement('button');
    b.className='part'+(save.wheels===k?' sel':'')+(owned?'':' locked');
    b.innerHTML='<span class="ico">'+w.ico+'</span><span class="nm">'+w.name+'</span>'+
      '<span class="st">'+(save.wheels===k?'✓ ON':owned?'USE':'🔩 '+w.cost)+'</span>';
    b.onclick=()=>{
      if(owned){save.wheels=k;persist();sfx.pickup();}
      else if(save.scrap>=w.cost){
        save.scrap-=w.cost;save.unlocked.push(k);save.wheels=k;persist();sfx.buy();
      }else sfx.nope();
      refreshMenu();
    };
    wd.appendChild(b);
  }
}
$('startBtn').addEventListener('click',startRun);
refreshMenu();

// ============================================================ main loop
let last=performance.now(),T=0;
function frame(now){
  const dt=Math.min(.033,(now-last)/1000);
  last=now;T+=dt;
  if(scene==='play')update(dt);
  render(T);
  if(scene==='menu')drawPreview(T);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{last=performance.now();});
</script>
