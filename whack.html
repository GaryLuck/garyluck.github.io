<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole!</title>
    <style>
        /* === STANDALONE CSS - NO EXTERNAL DEPENDENCIES === */
        
        :root {
            --grass-light: #4ade80;
            --grass-dark: #166534;
            --dirt-dark: #451a03;
            --dirt-light: #78350f;
            --text-main: #ffffff;
            --sky-blue: #38bdf8;
            --btn-bg: #facc15;
            --btn-text: #713f12;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: linear-gradient(to bottom, var(--sky-blue) 0%, var(--sky-blue) 30%, var(--grass-light) 30%, var(--grass-dark) 100%);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            
            /* Crucial for iPad action games: stops screen from dragging around */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }

        .header {
            text-align: center;
            padding-top: 2vh;
            margin-bottom: 2vh;
            width: 100%;
            height: 20vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: white;
            margin: 0;
            text-shadow: 2px 4px 0px rgba(0,0,0,0.2), -2px -2px 0px var(--grass-dark);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 3px solid var(--grass-dark);
            min-width: 90px;
        }

        .stat-label {
            display: block;
            font-size: 0.8rem;
            color: #4b5563;
            text-transform: uppercase;
            font-weight: 800;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: #b91c1c;
        }

        /* The Game Board */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: clamp(5px, 2vmin, 15px);
            
            /* Uses vmin so it always fits perfectly on screen, square aspect ratio */
            width: 90vmin;
            height: 90vmin;
            max-width: 600px;
            max-height: 600px;
            
            background: rgba(22, 101, 52, 0.4);
            padding: clamp(10px, 3vmin, 20px);
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        /* The Holes */
        .hole-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden; /* Hides the mole when it's down */
            border-radius: 15px;
        }

        /* The visual dirt hole at the bottom */
        .dirt-hole {
            position: absolute;
            bottom: 5%;
            width: 80%;
            height: 30%;
            background-color: var(--dirt-dark);
            border-radius: 50%;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.8), 0 5px 0 var(--dirt-light);
            z-index: 1;
        }

        /* The front lip of the hole so the mole can hide behind it */
        .dirt-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20%;
            background-color: transparent;
            z-index: 3;
        }

        /* The Mole */
        .mole {
            position: absolute;
            bottom: 15%; /* Starts behind the dirt front */
            width: 70%;
            height: 70%;
            font-size: clamp(2.5rem, 10vmin, 5rem);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            cursor: pointer;
            
            /* Start hidden underneath */
            transform: translateY(120%);
            transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            
            /* Stop tap highlights */
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* When the mole pops up */
        .mole.up {
            transform: translateY(0);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy pop up */
        }

        /* When the mole gets whacked */
        .mole.whacked {
            transform: translateY(20%) scale(0.8);
            filter: drop-shadow(0 0 10px red);
            transition: transform 0.1s, filter 0.1s;
        }

        .controls {
            margin-top: 3vh;
            height: 10vh;
        }

        .btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-weight: 900;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 50px;
            border: 4px solid #ca8a04;
            box-shadow: 0 6px 0 #a16207, 0 10px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #a16207, 0 4px 4px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0px 0 #a16207;
        }

        /* Whack visual effect */
        .pow {
            position: absolute;
            font-size: clamp(2rem, 8vmin, 4rem);
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease-out;
        }

        .pow.active {
            opacity: 1;
            transform: scale(1.2) translateY(-20px);
        }
        
        /* Modal for game over */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 5px solid var(--grass-dark);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal.active .modal-content {
            transform: scale(1);
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>WHACK-A-MOLE</h1>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <div id="scoreDisplay" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <span class="stat-label">Time</span>
                <div id="timeDisplay" class="stat-value">30</div>
            </div>
        </div>
    </div>

    <div class="game-board" id="gameBoard">
        <!-- 16 Holes generated by JS -->
    </div>

    <div class="controls">
        <button id="startBtn" class="btn" onclick="startGame()">Start Game</button>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
            <h2 style="font-size: 2.5rem; margin: 0; color: var(--grass-dark);">Time's Up!</h2>
            <p style="font-size: 1.5rem; font-weight: bold; color: #4b5563;">You whacked <span id="finalScore" style="color: #b91c1c; font-size: 2rem;">0</span> moles!</p>
            <button class="btn" style="margin-top: 15px;" onclick="closeModal()">Play Again</button>
        </div>
    </div>

    <script>
        // --- GAME VARIABLES ---
        const holesCount = 16;
        const gameDuration = 30; // Seconds
        let score = 0;
        let timeUp = false;
        let lastHole = null;
        let countdownTimer;
        let gameLoopTimer;
        
        // DOM Elements
        const board = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');
        const modal = document.getElementById('gameOverModal');
        const finalScoreDisplay = document.getElementById('finalScore');
        const moles = []; // Array to store mole elements
        
        // --- AUDIO SYSTEM (Web Audio API for offline sound) ---
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'pop') {
                // Happy little bloop sound when mole appears
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'whack') {
                // Cartoon bonk sound
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'over') {
                // Game over chime
                [523.25, 440, 349.23, 261.63].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.3, now + i*0.15);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.3);
                    o.start(now + i*0.15);
                    o.stop(now + i*0.15 + 0.3);
                });
            }
        }

        // --- GAME SETUP ---
        function createBoard() {
            for (let i = 0; i < holesCount; i++) {
                // Create container
                const holeContainer = document.createElement('div');
                holeContainer.className = 'hole-container';
                
                // Create dirt graphic
                const dirt = document.createElement('div');
                dirt.className = 'dirt-hole';
                
                // Create mole
                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.innerHTML = '🐹'; // Hamster emoji works great as a cute mole
                
                // Set up universal click/touch handling for the mole
                const whackHandler = function(e) {
                    e.preventDefault(); // Stop double-taps or weird mobile behaviors
                    whack(mole, i);
                };
                mole.addEventListener('touchstart', whackHandler, { passive: false });
                mole.addEventListener('mousedown', whackHandler);

                // Create POW graphic
                const pow = document.createElement('div');
                pow.className = 'pow';
                pow.innerHTML = '💥';
                pow.id = 'pow-' + i;

                // Assemble
                holeContainer.appendChild(dirt);
                holeContainer.appendChild(mole);
                holeContainer.appendChild(pow);
                
                // Create a front lip so mole hides properly
                const front = document.createElement('div');
                front.className = 'dirt-front';
                holeContainer.appendChild(front);

                board.appendChild(holeContainer);
                moles.push(mole);
            }
        }

        // --- GAME LOGIC ---
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole() {
            const idx = Math.floor(Math.random() * moles.length);
            const hole = moles[idx];
            // Prevent same hole twice in a row
            if (hole === lastHole) {
                return randomHole();
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            if (timeUp) return;
            
            // Adjust speed here for a 6yo: 800ms to 1500ms stays on screen
            const time = randomTime(800, 1500); 
            const mole = randomHole();
            
            // Make mole pop up
            mole.classList.add('up');
            mole.isWhacked = false; // Reset state
            mole.innerHTML = '🐹'; // Ensure it's the normal face
            playSound('pop');
            
            setTimeout(() => {
                mole.classList.remove('up');
                
                // Call peep again randomly if game isn't over
                if (!timeUp) {
                    // Small delay between moles popping up (300-800ms)
                    gameLoopTimer = setTimeout(peep, randomTime(300, 800));
                }
            }, time);
        }

        function whack(mole, index) {
            if (!mole.classList.contains('up') || mole.isWhacked) return;
            
            mole.isWhacked = true;
            score++;
            scoreDisplay.textContent = score;
            
            // Change visual to dizzy face and trigger CSS class
            mole.innerHTML = '😵';
            mole.classList.remove('up');
            mole.classList.add('whacked');
            
            // Show POW effect
            const pow = document.getElementById('pow-' + index);
            pow.classList.add('active');
            
            playSound('whack');
            
            // Clean up visual effects
            setTimeout(() => {
                mole.classList.remove('whacked');
                pow.classList.remove('active');
            }, 300);
        }

        function startGame() {
            initAudio(); // Initialize audio context on first button click
            
            scoreDisplay.textContent = 0;
            timeDisplay.textContent = gameDuration;
            timeUp = false;
            score = 0;
            startBtn.disabled = true;
            startBtn.innerText = "Whack 'em!";
            
            // Ensure all moles are down to start
            moles.forEach(m => {
                m.classList.remove('up', 'whacked');
                m.isWhacked = false;
                m.innerHTML = '🐹';
            });
            
            peep(); // Start the loop
            
            let timeLeft = gameDuration;
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    timeUp = true;
                    startBtn.disabled = false;
                    startBtn.innerText = "Start Game";
                    
                    setTimeout(() => {
                        finalScoreDisplay.textContent = score;
                        modal.classList.add('active');
                        playSound('over');
                    }, 1000); // Wait 1 sec before showing modal to let final moles sink
                }
            }, 1000);
        }

        function closeModal() {
            modal.classList.remove('active');
            // Small delay to allow modal to fade out before resetting
            setTimeout(() => {
                scoreDisplay.textContent = 0;
                timeDisplay.textContent = gameDuration;
            }, 300);
        }

        // Initialize the HTML on load
        window.onload = createBoard;

    </script>
</body>
</html>
